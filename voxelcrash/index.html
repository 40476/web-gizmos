<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Voxel Crash</title>

    <!-- External Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f0f1a;
            --primary: #FF3366;
            --primary-shadow: #cc0044;
            --secondary: #33CCFF;
            --secondary-shadow: #0099cc;
            --panel-bg: rgba(42, 42, 74, 0.85);
            --panel-border: #4a4a7a;
            --sidebar-width: 320px;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-color);
            font-family: 'Fredoka', sans-serif; touch-action: none;
        }

        #fluid-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; filter: blur(40px); opacity: 0.6; pointer-events: none;
        }

        #app-container {
            display: flex; flex-direction: row; width: 100%; height: 100%;
            position: relative; z-index: 1;
        }

        #game-container {
            flex-grow: 1; height: 100%; position: relative; overflow: hidden;
            min-height: 0;
        }

        #sidebar {
            width: var(--sidebar-width); height: 100%;
            background: var(--panel-bg); backdrop-filter: blur(10px);
            border-left: 6px solid var(--panel-border);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; box-sizing: border-box; z-index: 10;
            box-shadow: -10px 0 20px rgba(0,0,0,0.5);
            overflow-y: auto; /* Add scrolling if content is too tall */
        }

        #sidebar h2 {
            color: var(--secondary);
            margin: 0 0 15px 0;
            text-shadow: 2px 2px 0px var(--secondary-shadow);
            text-transform: uppercase;
            font-size: 18px;
            width: 100%;
            text-align: center;
        }

        #art-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        #art-canvas-container {
            background: #111122; border: 4px solid var(--panel-border);
            border-radius: 12px; padding: 10px; width: 100%;
            aspect-ratio: 1; position: relative; overflow: hidden;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        #art-canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            display: block;
        }

        #art-progress {
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0 0 0;
            text-align: center;
            width: 100%;
        }

        #controls-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto; /* Push to bottom */
            padding-top: 15px;
            border-top: 2px solid var(--panel-border);
        }

        .control-group {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        .control-group-title {
            color: var(--secondary);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            text-align: center;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
        }

        .toggle-label {
            font-size: 14px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            width: 48px;
            height: 26px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 26px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider {
            background-color: var(--secondary);
        }
        input:checked + .toggle-slider:before {
            transform: translateX(22px);
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 20px; box-sizing: border-box; z-index: 5;
        }

        .interactive { pointer-events: auto; }

        .score-box {
            background: var(--panel-bg); backdrop-filter: blur(5px); border: 4px solid var(--panel-border);
            border-radius: 16px; padding: 10px 30px; color: white;
            font-size: 32px; font-weight: 600; box-shadow: 0 8px 0px rgba(0,0,0,0.3);
            text-align: center; align-self: flex-start;
        }
        .score-box span { display: block; font-size: 14px; color: var(--secondary); text-transform: uppercase; }

        .game-status {
            background: var(--panel-bg); backdrop-filter: blur(5px); border: 4px solid var(--panel-border);
            border-radius: 16px; padding: 8px 16px; color: white;
            font-size: 16px; font-weight: 600; box-shadow: 0 4px 0px rgba(0,0,0,0.3);
            text-align: center; align-self: flex-start; margin-top: 10px;
        }
        .status-indicator {
            display: inline-block; width: 12px; height: 12px; border-radius: 50%;
            margin-right: 8px; vertical-align: middle;
        }
        .status-indicator.active { background-color: #33FF33; box-shadow: 0 0 8px #33FF33; }
        .status-indicator.inactive { background-color: #666; }

        .btn {
            background: var(--primary); border: 4px solid #fff; border-radius: 16px;
            color: white; padding: 12px 24px; font-size: 20px; font-family: 'Fredoka', sans-serif;
            font-weight: 600; cursor: pointer; box-shadow: 0 6px 0 var(--primary-shadow), 0 10px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.2s; text-transform: uppercase; outline: none; margin: 5px;
            display: inline-flex; justify-content: center; align-items: center; gap: 8px; width: 100%; box-sizing: border-box;
        }
        .btn:hover { transform: translateY(2px); box-shadow: 0 4px 0 var(--primary-shadow), 0 8px 8px rgba(0,0,0,0.3); }
        .btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--primary-shadow); }
        .btn:disabled { filter: grayscale(100%); cursor: not-allowed; transform: translateY(6px); box-shadow: 0 0 0 #000; }

        .btn.secondary { background: var(--secondary); box-shadow: 0 6px 0 var(--secondary-shadow), 0 10px 10px rgba(0,0,0,0.3); }
        .btn.secondary:hover { box-shadow: 0 4px 0 var(--secondary-shadow), 0 8px 8px rgba(0,0,0,0.3); }
        .btn.secondary:active { box-shadow: 0 0 0 var(--secondary-shadow); }

        .btn.tertiary { background: #2a2a4a; border-color: #4a4a7a; box-shadow: 0 6px 0 #1a1a2e, 0 10px 10px rgba(0,0,0,0.3); font-size: 16px; padding: 10px 15px; }
        .btn.tertiary:hover { box-shadow: 0 4px 0 #1a1a2e, 0 8px 8px rgba(0,0,0,0.3); }
        .btn.tertiary:active { box-shadow: 0 0 0 #1a1a2e; }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 26, 0.9); backdrop-filter: blur(12px); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        h1 {
            font-size: 80px; color: white; margin: 0 0 30px 0; text-align: center; line-height: 1;
            text-shadow: 6px 6px 0 var(--primary), 12px 12px 0px rgba(0,0,0,0.5);
        }

        .start-menu-layout {
            display: flex; flex-direction: row; gap: 30px;
            align-items: stretch; justify-content: center;
            max-width: 700px; width: 90%;
        }

        .panel-container {
            background: var(--panel-bg); border: 4px solid var(--panel-border);
            padding: 25px; border-radius: 16px; text-align: center; color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex: 1;
            display: flex; flex-direction: column; justify-content: center;
        }

        .start-buttons-col {
            display: flex; flex-direction: column; gap: 15px; flex: 1; justify-content: center;
        }
        .start-buttons-col .btn { margin: 0; }

        /* =========================================
           WIN SCREEN LAYOUT (Responsive)
           ========================================= */
        #win-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 26, 0.9); backdrop-filter: blur(12px); z-index: 150;
            display: none; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; box-sizing: border-box;
        }

        .win-content {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 400px;
        }

        .win-controls {
            display: flex; flex-direction: column; width: 100%; gap: 12px;
        }

        #win-card {
            background: #111122; border: 4px solid var(--panel-border);
            border-radius: 16px; padding: 20px; margin-bottom: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); text-align: center;
            width: 100%; max-width: 300px; box-sizing: border-box; flex-shrink: 0;
        }

        #win-card canvas {
            width: 100%; aspect-ratio: 1; image-rendering: pixelated;
            background: rgba(255,255,255,0.05); border-radius: 8px; border: 2px solid #2a2a4a;
        }

        #win-level-name { color: var(--secondary); margin: 15px 0 5px 0; font-size: 24px; text-transform: uppercase; }
        #win-stats { color: #8888aa; font-size: 14px; margin: 0; font-family: monospace; }

        .share-row { display: flex; gap: 10px; width: 100%; }
        .share-row .btn { flex: 1; margin: 0; }

        /* Desktop Landscape - Side by Side layout for Win Screen */
        @media (min-width: 768px) and (orientation: landscape) {
            #win-screen h1 { font-size: 70px; margin-bottom: 40px; }
            .win-content { flex-direction: row; gap: 50px; max-width: 800px; justify-content: center; align-items: center; }
            #win-card { margin-bottom: 0; }
            .win-controls { max-width: 320px; }
        }

        select, input[type="text"], input[type="file"], textarea {
            width: 100%; padding: 12px; border-radius: 12px; border: 3px solid var(--panel-border);
            background: #1a1a2e; color: white; font-family: 'Fredoka', sans-serif; font-size: 16px; box-sizing: border-box; outline: none; margin-bottom: 15px;
        }

        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 200;
        }
        .modal {
            background: var(--panel-bg); border: 6px solid var(--panel-border);
            border-radius: 24px; padding: 30px; width: 90%; max-width: 500px;
            color: white; box-shadow: 0 20px 0px rgba(0,0,0,0.5); position: relative;
        }
        .close-modal {
            position: absolute; top: -15px; right: -15px; background: var(--primary);
            border: 4px solid white; color: white; width: 40px; height: 40px;
            border-radius: 50%; font-weight: bold; font-size: 20px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 0 var(--primary-shadow);
        }
        #shuffle-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 40px; font-weight: bold; text-shadow: 4px 4px 0 var(--primary);
            pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 50; text-align: center;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            h1 { font-size: 55px; margin-bottom: 20px; }
            .start-menu-layout { flex-direction: column; gap: 15px; }
            .panel-container { padding: 15px; }

            #app-container { flex-direction: column; }
            #sidebar {
                width: 100%; height: auto; max-height: 40vh;
                flex-direction: column; align-items: stretch;
                padding: 15px; border-left: none; border-top: 4px solid var(--panel-border);
                box-shadow: 0 -10px 20px rgba(0,0,0,0.5); gap: 10px;
            }

            #sidebar h2 { display: none; }
            #art-canvas-container {
                width: 120px;
                height: 120px;
                padding: 5px;
                border-width: 3px;
                margin: 0 auto;
            }
            #art-progress {
                font-size: 14px !important;
                margin: 5px 0 0 0 !important;
            }

            .control-group {
                padding: 8px;
            }

            .toggle-label {
                font-size: 13px;
            }

            #btn-menu {
                margin: 0 !important;
                font-size: 14px;
                padding: 8px 12px;
            }

            .score-box { font-size: 20px; padding: 5px 15px; border-width: 3px; }
            .score-box span { font-size: 11px; }

            #win-card { width: 100%; max-width: 260px; padding: 15px; margin-bottom: 15px;}
            .share-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <canvas id="fluid-bg"></canvas>

    <div id="app-container">
        <!-- Main Game Area -->
        <div id="game-container">
            <div id="shuffle-msg">NO MOVES!<br>FIXING BOARD...</div>
            <div id="ui-layer">
                <div class="score-box interactive">
                    <span>Score</span>
                    <div id="score-display">0</div>
                </div>
                <div class="game-status interactive">
                    <span class="status-indicator" id="auto-status"></span>
                    <span id="auto-status-text">Manual</span>
                </div>
            </div>
        </div>

        <!-- Sidebar / Bottom Bar -->
        <div id="sidebar">
            <h2>Target Art</h2>

            <div id="art-section">
                <div id="art-canvas-container">
                    <canvas id="art-canvas"></canvas>
                </div>
                <p id="art-progress">0 / 0 Pixels</p>
            </div>

            <div id="controls-section">
                <div class="control-group">
                    <div class="control-group-title">Game Settings</div>
                    <div class="toggle-row">
                        <span class="toggle-label">
                            🤖 Auto Play
                        </span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="auto-play-toggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="toggle-row">
                        <span class="toggle-label">
                            💡 Show Hints
                        </span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="show-hint-toggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>

                <div id="controls" class="interactive">
                    <button class="btn tertiary" id="btn-menu">Main Menu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>VOXEL<br>CRASH</h1>

        <div class="start-menu-layout">
            <div class="panel-container">
                <h3 style="margin-top:0; color: var(--secondary); font-size: 22px;">Select Level</h3>
                <select id="level-select"></select>
                <label style="display:block; margin: 10px 0; font-weight: 600;">Grid Size: <span id="grid-size-display">8x8</span></label>
                <input type="range" id="grid-size-slider" min="6" max="12" step="1" value="8" style="width: 100%; accent-color: var(--primary);">
            </div>

            <div class="start-buttons-col">
                <button class="btn" id="btn-play-solo" style="font-size: 24px; padding: 20px;">Play Level</button>
                <button class="btn secondary" id="btn-open-importer" style="font-size: 18px;">Custom Art Importer</button>
            </div>
        </div>
    </div>

    <!-- Responsive Win Screen -->
    <div id="win-screen">
        <h1 style="margin-bottom: 15px;">MASTERPIECE!</h1>
        <div class="win-content">
            <div id="win-card">
                <canvas id="win-canvas" width="240" height="240"></canvas>
                <h3 id="win-level-name">Level Name</h3>
                <p id="win-stats">Grid: 8x8 | Target: 16x16</p>
            </div>

            <div class="win-controls">
                <button class="btn secondary" id="btn-export-card" style="margin-bottom: 10px;">📸 Export Card</button>
                <div class="share-row">
                    <button class="btn tertiary" id="btn-share-sms">📱 SMS</button>
                    <button class="btn tertiary" id="btn-share-matrix">💬 Share</button>
                </div>
                <button class="btn" id="btn-win-menu" style="margin-top: 10px;">Back to Menu</button>
            </div>
        </div>
    </div>

    <!-- Importer Modal -->
    <div class="modal-overlay" id="importer-modal">
        <div class="modal">
            <button class="close-modal" id="btn-close-importer">X</button>
            <h2 style="margin-top:0; color: var(--secondary); text-align:center;">Art Importer</h2>

            <label style="display:block; margin-bottom: 5px; font-size:14px; color:#aaa;">Target Resolution</label>
            <select id="import-res">
                <option value="8">8x8 Pixels</option>
                <option value="16" selected>16x16 Pixels</option>
                <option value="24">24x24 Pixels</option>
                <option value="32">32x32 Pixels</option>
            </select>

            <label style="display:flex; align-items:center; cursor:pointer; margin-bottom:15px; font-size:14px;">
                <input type="checkbox" id="import-keep-bg" style="width:auto; transform:scale(1.5); margin-right:10px;">
                Make Transparent Playable (Black)
            </label>

            <input type="file" id="image-upload" accept="image/png, image/jpeg, image/webp">

            <label style="display:block; margin-bottom: 5px; font-size:14px; color:#aaa;">Generated JSON</label>
            <textarea id="json-export-area" readonly style="height: 100px; font-family: monospace; font-size: 12px;"></textarea>

            <div style="display:flex; justify-content: space-between; gap: 10px;">
                <button class="btn secondary" id="btn-copy-json" style="flex:1; font-size: 14px;">Copy</button>
                <button class="btn" id="btn-play-custom" style="flex:1; font-size: 14px;">Play Art</button>
            </div>
            <canvas id="hidden-process-canvas" style="display:none;"></canvas>
        </div>
    </div>

    <!-- Game Logic -->
    <script>
        var CHAR_TO_COLOR = {
            'r': { hex: 0xFF3333, rgb: {r:255, g:51, b:51} },
            'g': { hex: 0x33FF33, rgb: {r:51, g:255, b:51} },
            'b': { hex: 0x3333FF, rgb: {r:51, g:51, b:255} },
            'y': { hex: 0xFFFF33, rgb: {r:255, g:255, b:51} },
            'c': { hex: 0x33FFFF, rgb: {r:51, g:255, b:255} },
            'm': { hex: 0xFF33FF, rgb: {r:255, g:51, b:255} },
            'o': { hex: 0xFFA500, rgb: {r:255, g:165, b:0} },
            'p': { hex: 0x800080, rgb: {r:128, g:0, b:128} },
            'w': { hex: 0xFFFFFF, rgb: {r:255, g:255, b:255} },
            'k': { hex: 0x333333, rgb: {r:51, g:51, b:51} }
        };
        var COLOR_CHARS = Object.keys(CHAR_TO_COLOR);
        const FALLBACK_COLORS = ['b', 'r', 'g', 'y', 'c', 'm', 'p', 'o'];

        const CONFIG = { gridSize: 8, blockSize: 1, spacing: 1.1, swapSpeed: 10.0 };
        const STATE = { IDLE: 0, SWAPPING: 1, MATCHING: 2, DROPPING: 3, SHUFFLING: 4, WON: 5 };
        let gameState = STATE.IDLE;
        let score = 0;
        let lastInteraction = { x: -1, y: -1 };

        let currentLevelName = "Custom Art";
        let currentArtRes = 16;
        let currentGridSize = 8;
        let targetPixels = [];

        // Toggle states
        let autoPlay = false;
        let showHint = false;
        let autoPlayInterval = null;
        let hintMove = null;
        let hintWireframes = [];

        const LEVELS = {
            /*'potion': {
                name: 'Magic Potion', grid: 10, resolution: 16, keepBg: false,
                imageUrl: "data:image/svg+xml;charset=utf-8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M6 2h4v2H6z" fill="#ccc"/><path d="M7 4h2v3l3 4v3H4v-3l3-4V4z" fill="#33ccff"/><path d="M4 14h8v1H4z" fill="#ccc"/></svg>')
            },*/

            'flower': {
                name: 'Fire Flower', grid: 10, resolution: 16, keepBg: false,
                imageUrl: "data:image/svg+xml;charset=utf-8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><circle cx="8" cy="6" r="4" fill="#ff3333"/><circle cx="8" cy="6" r="2" fill="#ffff33"/><rect x="7" y="10" width="2" height="6" fill="#33ff33"/><path d="M7 13C4 13 3 10 3 10s3 1 4 3zM9 13c3 0 4-3 4-3s-3 1-4 3z" fill="#33ff33"/></svg>')
            },

            'mushroom': {
                name: 'Power Mushroom', grid: 10, resolution: 16, keepBg: false,
                imageUrl: "data:image/svg+xml;charset=utf-8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M3 8c0-4 2-6 5-6s5 2 5 6H3z" fill="#ff3333"/><rect x="6" y="8" width="4" height="6" fill="#ffcc99"/><circle cx="5" cy="5" r="1.5" fill="#ffffff"/><circle cx="11" cy="5" r="1.5" fill="#ffffff"/><circle cx="8" cy="3.5" r="1.5" fill="#ffffff"/></svg>')
            },

            'coin': {
                name: 'Gold Coin', grid: 10, resolution: 16, keepBg: false,
                imageUrl: "data:image/svg+xml;charset=utf-8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="#ffcc00"/><circle cx="8" cy="8" r="4" fill="#ffff66"/><rect x="7" y="5" width="2" height="6" fill="#ff9900"/></svg>')
            },

            'star': {
                name: 'Invincible Star', grid: 10, resolution: 16, keepBg: false,
                imageUrl: "data:image/svg+xml;charset=utf-8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M8 1l2.2 4.5 4.8.7-3.5 3.4.8 4.8L8 12l-4.3 2.4.8-4.8L1 6.2l4.8-.7L8 1z" fill="#ffff33"/><rect x="6" y="7" width="1" height="3" fill="#000000"/><rect x="9" y="7" width="1" height="3" fill="#000000"/></svg>')
            },

            'potion2': {

        function mapValueToPercent(valuesArray, inputValue) {
            if (!Array.isArray(valuesArray) || valuesArray.length === 0) return null;
            const min = Math.min(...valuesArray);
            const max = Math.max(...valuesArray);
            if (max === min) return (inputValue === min) ? 100 : 0;
            const percentage = ((inputValue - min) / (max - min)) * 100;
            return Math.max(0, Math.min(100, percentage));
        }

        function getClosestColorChar(r, g, b) {
            if (!COLOR_CHARS || COLOR_CHARS.length === 0) return 'w';
            let closestChar = 'w';
            let minDistance = Infinity;
            for (let i = 0; i < COLOR_CHARS.length; i++) {
                const char = COLOR_CHARS[i];
                if (char === '_') continue;
                const colorData = CHAR_TO_COLOR[char];
                if (!colorData || !colorData.rgb) continue;
                const c = colorData.rgb;
                const dist = (r - c.r)**2 + (g - c.g)**2 + (b - c.b)**2;
                if (dist < minDistance) {
                    minDistance = dist;
                    closestChar = char;
                }
            }
            return closestChar;
        }

        function getChar(index) {
            if (index < 10) return index.toString();
            if (index < 36) return String.fromCharCode(87 + index);
            if (index < 62) return String.fromCharCode(29 + index);
            return '?';
        }

        function getColorDistance(rgb1, rgb2) {
            return Math.pow(rgb1.r - rgb2.r, 2) +
                Math.pow(rgb1.g - rgb2.g, 2) +
                Math.pow(rgb1.b - rgb2.b, 2);
        }

        function loadImageToArt(url, res, keepBg) {
            return new Promise((resolve, reject) => {
                const THRESHOLD = 1200;
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    cvs.width = res; cvs.height = res;
                    const pCtx = cvs.getContext('2d', { willReadFrequently: true });
                    pCtx.drawImage(img, 0, 0, res, res);
                    const imgData = pCtx.getImageData(0, 0, res, res).data;

                    CHAR_TO_COLOR = {};
                    let jsonArray = [];
                    let colorCounter = 0;

                    for (let y = 0; y < res; y++) {
                        let rowStr = '';
                        for (let x = 0; x < res; x++) {
                            const idx = (y * res + x) * 4;
                            const r = imgData[idx], g = imgData[idx+1], b = imgData[idx+2], a = imgData[idx+3];

                            if (a < 10) {
                                rowStr += keepBg ? 'k' : '_';
                                if (keepBg && !CHAR_TO_COLOR['k']) {
                                    CHAR_TO_COLOR['k'] = { hex: "#333333", rgb: {r:51, g:51, b:51} };
                                }
                            } else {
                                const currentRGB = { r, g, b };
                                let matchedChar = null;
                                for (let char in CHAR_TO_COLOR) {
                                    if (char === 'k' || char === '_') continue;
                                    const dist = getColorDistance(currentRGB, CHAR_TO_COLOR[char].rgb);
                                    if (dist < THRESHOLD) {
                                        matchedChar = char;
                                        break;
                                    }
                                }
                                if (!matchedChar) {
                                    const char = getChar(colorCounter++);
                                    CHAR_TO_COLOR[char] = {
                                        hex: "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1),
                                        rgb: currentRGB
                                    };
                                    matchedChar = char;
                                }
                                rowStr += matchedChar;
                            }
                        }
                        jsonArray.push(rowStr);
                    }

                    COLOR_CHARS = Object.keys(CHAR_TO_COLOR);
                    resolve(jsonArray);
                };

        function updateFluid() {
            if(fCanvas.width !== window.innerWidth) fCanvas.width = window.innerWidth;
            if(fCanvas.height !== window.innerHeight) fCanvas.height = window.innerHeight;
            fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);
            fCtx.globalCompositeOperation = 'screen';
            blobs.forEach((b) => {
                b.x += b.vx; b.y += b.vy;
                if(b.x < -b.r) b.x = fCanvas.width + b.r;
                if(b.x > fCanvas.width + b.r) b.x = -b.r;
                if(b.y < -b.r) b.y = fCanvas.height + b.r;
                if(b.y > fCanvas.height + b.r) b.y = -b.r;

                if (b.colorChar !== b.targetColorChar) b.targetOpacity = 0;
                else b.targetOpacity = 0.6;

                b.opacity += (b.targetOpacity - b.opacity) * 0.08;
                if (b.opacity <= 0.02 && b.colorChar !== b.targetColorChar) {
                    b.colorChar = b.targetColorChar;
                    b.opacity = 0.02;
                }

                if (b.opacity > 0.01) {
                    fCtx.beginPath();
                    fCtx.arc(b.x, b.y, b.r, 0, Math.PI*2);
                    const colorData = CHAR_TO_COLOR[b.colorChar];
                    let r = 255, g = 255, bl = 255;
                    if (colorData && colorData.rgb) {
                        r = colorData.rgb.r;
                        g = colorData.rgb.g;
                        bl = colorData.rgb.b;
                    }
                    fCtx.fillStyle = `rgba(${r}, ${g}, ${bl}, ${b.opacity})`;
                    fCtx.fill();

            });

        /** THREE.JS CORE */

        class Block {
            constructor(x, y, charKey, powerupType = 'none') {

                if (this.powerup === 'line') { this.mesh.add(new THREE.LineSegments(lineGeo, lineMat)); }
                else if (this.powerup === 'color') { this.baseMesh.visible = false; this.bombCore = new THREE.Mesh(colorBombGeo, colorBombMat); this.mesh.add(this.bombCore); }
            }
            changeToPowerup(type) { this.powerup = type; this.applyPowerupVisuals(); }
            updatePos(delta) {
                this.mesh.position.lerp(this.targetPos, delta * CONFIG.swapSpeed);
                if (this.powerup === 'color' && this.bombCore) { this.bombCore.rotation.x += delta * 5; this.bombCore.rotation.y += delta * 5; }
            }
            setGridPos(x, y) { this.gridX = x; this.gridY = y; this.targetPos.set(x * CONFIG.spacing, y * CONFIG.spacing, 0); }

        function findValidMove() {
            for (let x = 0; x < CONFIG.gridSize; x++) {
                for (let y = 0; y < CONFIG.gridSize; y++) {
                    if (x < CONFIG.gridSize - 1 && testSwap(x, y, x+1, y)) {
                        return { x1: x, y1: y, x2: x+1, y2: y };
                    }
                    if (y < CONFIG.gridSize - 1 && testSwap(x, y, x, y+1)) {
                        return { x1: x, y1: y, x2: x, y2: y+1 };
                    }
                }
            }
            return null;
        }

        function hasPossibleMoves() {
            return findValidMove() !== null;
        }

        // Fix board by finding a strategic swap that creates valid moves
        function fixBoard() {
            console.log("Fixing board - no valid moves found");
            clearHint();

            // Try up to 100 random swaps to find one that creates valid moves
            for (let attempts = 0; attempts < 100; attempts++) {
                const x1 = Math.floor(Math.random() * CONFIG.gridSize);
                const y1 = Math.floor(Math.random() * CONFIG.gridSize);
                const x2 = x1 + (Math.random() > 0.5 ? 1 : 0);
                const y2 = y1 + (Math.random() > 0.5 ? 1 : 0);

                if (x2 >= CONFIG.gridSize || y2 >= CONFIG.gridSize) continue;

                const b1 = grid[x1][y1];
                const b2 = grid[x2][y2];

                if (!b1 || !b2) continue;
                if (b1.charKey === b2.charKey) continue; // Don't swap same colors

                // Temporarily swap and check if this creates ANY valid moves
                grid[x1][y1] = b2; grid[x2][y2] = b1;
                const hasMovesAfterSwap = hasPossibleMoves();
                grid[x1][y1] = b1; grid[x2][y2] = b2;

                if (hasMovesAfterSwap) {
                    // Execute this swap
                    grid[x1][y1] = b2; grid[x2][y2] = b1;
                    b1.setGridPos(x2, y2); b2.setGridPos(x1, y1);

                    gameState = STATE.SWAPPING;
                    setTimeout(() => {
                        const matchData = findMatches();
                        if (matchData.list.length > 0) {
                            processMatches(matchData);
                        } else {
                            gameState = STATE.IDLE;
                            updateHint();
                        }
                    }, 300);

                    return true;
                }
            }

            // If strategic swap failed, do a full shuffle
            console.log("Strategic swap failed, shuffling entire board");
            return shuffleBoardLogic();
        }

        function shuffleBoardLogic() {
            const MAX_ATTEMPTS = 50;
            let attempts = 0;
            let valid = false;

            while (attempts < MAX_ATTEMPTS && !valid) {
                // Shuffle all block colors
                let chars = [], pu = [];
                for(let x = 0; x < CONFIG.gridSize; x++) {
                    for(let y = 0; y < CONFIG.gridSize; y++) {
                        if(grid[x] && grid[x][y]) {
                            chars.push(grid[x][y].charKey);
                            pu.push(grid[x][y].powerup);
                        }
                    }
                }

                // Fisher-Yates shuffle
                for (let i = chars.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [chars[i], chars[j]] = [chars[j], chars[i]];
                    [pu[i], pu[j]] = [pu[j], pu[i]];
                }

                // Reassign blocks
                let i = 0;
                for(let x = 0; x < CONFIG.gridSize; x++) {
                    for(let y = 0; y < CONFIG.gridSize; y++) {
                        if(grid[x] && grid[x][y]) {
                            boardGroup.remove(grid[x][y].mesh);
                            grid[x][y] = new Block(x, y, chars[i], pu[i]);
                            i++;
                        }
                    }
                }

                // Check if board is valid (no initial matches and has possible moves)
                const noMatches = findMatches().list.length === 0;
                const hasMoves = hasPossibleMoves();
                valid = noMatches && hasMoves;
                attempts++;
            }

            if (valid) {
                console.log(`Board fixed after ${attempts} shuffle attempt(s)`);
                setTimeout(() => {
                    document.getElementById('shuffle-msg').style.opacity = 0;
                    gameState = STATE.IDLE;
                    updateHint();
                }, 500);
            } else {
                console.error("Failed to fix board after maximum attempts");
                // As last resort, force create a move by swapping two adjacent different blocks
                for (let attempts = 0; attempts < 50; attempts++) {
                    const x1 = Math.floor(Math.random() * CONFIG.gridSize);
                    const y1 = Math.floor(Math.random() * CONFIG.gridSize);
                    const directions = [[1,0], [0,1], [-1,0], [0,-1]];
                    const [dx, dy] = directions[Math.floor(Math.random() * directions.length)];
                    const x2 = x1 + dx, y2 = y1 + dy;

                    if (x2 < 0 || x2 >= CONFIG.gridSize || y2 < 0 || y2 >= CONFIG.gridSize) continue;

                    const b1 = grid[x1][y1];
                    const b2 = grid[x2][y2];

                    if (!b1 || !b2 || b1.charKey === b2.charKey) continue;

                    grid[x1][y1] = b2; grid[x2][y2] = b1;
                    b1.setGridPos(x2, y2); b2.setGridPos(x1, y1);

                    if (hasPossibleMoves()) {
                        gameState = STATE.IDLE;
                        updateHint();
                        return true;
                    }

                    // Swap back
                    grid[x1][y1] = b1; grid[x2][y2] = b2;
                    b1.setGridPos(x1, y1); b2.setGridPos(x2, y2);
                }
            }

            return valid;
        }

        function initBoard() {
            while(boardGroup.children.length > 0) { boardGroup.remove(boardGroup.children[0]); }
            grid = []; score = 0; updateScore(0); gameState = STATE.IDLE;
            const offset = (CONFIG.gridSize * CONFIG.spacing) / 2 - (CONFIG.spacing / 2);
            boardGroup.position.set(-offset, -offset, 0);
            camera.position.set(0, -2, Math.max(16, CONFIG.gridSize * 2.2)); camera.lookAt(0, 0, 0);

            COLOR_CHARS.forEach(char => {
                const rawColor = CHAR_TO_COLOR[char].hex;
                const cleanHex = ensureHexColor(rawColor);
                materials[char] = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(cleanHex),
                    roughness: 0.2,
                    metalness: 0.1,
                    emissive: new THREE.Color(cleanHex),
                    emissiveIntensity: 0.1
                });
            });

            // Generate initial board
            for (let x = 0; x < CONFIG.gridSize; x++) {
                grid[x] = [];
                for (let y = 0; y < CONFIG.gridSize; y++) {
                    let charKey;
                    do { charKey = getRandomSpawnColor(); } while (
                        (x >= 2 && grid[x-1] && grid[x-1][y].charKey === charKey && grid[x-2] && grid[x-2][y].charKey === charKey) ||
                        (y >= 2 && grid[x][y-1] && grid[x][y-1].charKey === charKey && grid[x][y-2] && grid[x][y-2].charKey === charKey)
                    );
                    grid[x][y] = new Block(x, y, charKey);
                }
            }

            // Check if board is playable and fix if needed
            if (!hasPossibleMoves() || findMatches().list.length > 0) {
                console.log("Initial board invalid, fixing...");
                if (!fixBoard()) {
                    console.error("Failed to create valid board");
                }
            }
        }

        function testSwap(x1, y1, x2, y2) {
            let b1 = grid[x1][y1], b2 = grid[x2][y2];
            if (!b1 || !b2) return false;
            grid[x1][y1] = b2; grid[x2][y2] = b1;
            let m = findMatches().list.length > 0;
            grid[x1][y1] = b1; grid[x2][y2] = b2;
            return m;
        }

        function findMatches() {
            let matchedBlocks = new Set(), sequences = [];
            for (let y = 0; y < CONFIG.gridSize; y++) {
                let currentLen = 1;
                for (let x = 0; x < CONFIG.gridSize; x++) {
                    let b = grid[x][y], nextB = (x < CONFIG.gridSize - 1) ? grid[x+1][y] : null;
                    if (b && nextB && b.charKey === nextB.charKey && b.powerup !== 'color' && nextB.powerup !== 'color') { currentLen++; }
                    else {
                        if (currentLen >= 3) {
                            let seq = [];
                            for(let i = 0; i < currentLen; i++) {
                                seq.push(grid[x - i][y]);
                                matchedBlocks.add(grid[x - i][y]);
                            }
                            sequences.push({ len: currentLen, blocks: seq, type: 'row' });
                        }
                        currentLen = 1;
                    }
                }
            }
            for (let x = 0; x < CONFIG.gridSize; x++) {
                let currentLen = 1;
                for (let y = 0; y < CONFIG.gridSize; y++) {
                    let b = grid[x][y], nextB = (y < CONFIG.gridSize - 1) ? grid[x][y+1] : null;
                    if (b && nextB && b.charKey === nextB.charKey && b.powerup !== 'color' && nextB.powerup !== 'color') { currentLen++; }
                    else {
                        if (currentLen >= 3) {
                            let seq = [];
                            for(let i = 0; i < currentLen; i++) {
                                seq.push(grid[x][y - i]);
                                matchedBlocks.add(grid[x][y - i]);
                            }
                            sequences.push({ len: currentLen, blocks: seq, type: 'col' });
                        }
                        currentLen = 1;
                    }
                }
            }
            return { list: Array.from(matchedBlocks), sequences: sequences };
        }

        function destroyColor(charKey) {
            let toDestroy = new Set();
            for(let x = 0; x < CONFIG.gridSize; x++) {
                for(let y = 0; y < CONFIG.gridSize; y++) {
                    if(grid[x][y] && grid[x][y].charKey === charKey)
                        toDestroy.add(grid[x][y]);
                }
            }
            return toDestroy;
        }

        function destroyLine(block) {
            let toDestroy = new Set();
            for(let i = 0; i < CONFIG.gridSize; i++) {
                if(grid[i][block.gridY]) toDestroy.add(grid[i][block.gridY]);
                if(grid[block.gridX][i]) toDestroy.add(grid[block.gridX][i]);
            }
            return toDestroy;
        }

        function processMatches(matchData) {
            gameState = STATE.MATCHING;
            clearHint();
            let powerupToSpawn = null, spawnTarget = null;
            matchData.sequences.sort((a,b) => b.len - a.len);
            if (matchData.sequences.length > 0) {
                let topSeq = matchData.sequences[0];
                if (topSeq.len >= 5) powerupToSpawn = 'color';
                else if (topSeq.len === 4) powerupToSpawn = 'line';

                if (powerupToSpawn) {
                    spawnTarget = topSeq.blocks.find(b => b.gridX === lastInteraction.x && b.gridY === lastInteraction.y);
                    if (!spawnTarget) spawnTarget = topSeq.blocks[Math.floor(topSeq.blocks.length / 2)];
                    matchData.list = matchData.list.filter(b => b !== spawnTarget);
                    spawnTarget.changeToPowerup(powerupToSpawn);
                }
            }

            let fullDestructionSet = new Set(matchData.list), checkQueue = [...matchData.list];
            while(checkQueue.length > 0) {
                let b = checkQueue.pop();
                if (b.powerup === 'line') {
                    let lineBlocks = destroyLine(b);
                    lineBlocks.forEach(lb => {
                        if (!fullDestructionSet.has(lb) && lb !== spawnTarget) {
                            fullDestructionSet.add(lb);
                            checkQueue.push(lb);
                        }
                    });
                }
            }
            executeDestruction(Array.from(fullDestructionSet));
        }

        function executeDestruction(blocksArray) {
            let points = blocksArray.length * 10; updateScore(points);
            blocksArray.forEach((block, index) => {
                if (block.isDestroying) return;
                block.isDestroying = true;
                const worldPos = new THREE.Vector3(); block.mesh.getWorldPosition(worldPos);
                spawnVoxelExplosion(worldPos, block.charKey);

                if(block.powerup === 'none') {
                    setTimeout(() => { triggerArtFill(block.charKey); }, index * 40);
                }
                boardGroup.remove(block.mesh);
                grid[block.gridX][block.gridY] = null;
            });
            setTimeout(() => { applyGravity(); }, 400);
        }

        function applyGravity() {
            gameState = STATE.DROPPING;
            clearHint();
            for (let x = 0; x < CONFIG.gridSize; x++) {
                let emptySpaces = 0;
                for (let y = 0; y < CONFIG.gridSize; y++) {
                    if (grid[x][y] === null) { emptySpaces++; }
                    else if (emptySpaces > 0) {
                        let block = grid[x][y];
                        grid[x][y - emptySpaces] = block;
                        grid[x][y] = null;
                        block.setGridPos(x, y - emptySpaces);
                    }
                }
                for (let i = 0; i < emptySpaces; i++) {
                    let charKey = getRandomSpawnColor();
                    let newY = CONFIG.gridSize - 1 - i;
                    let block = new Block(x, newY, charKey);
                    block.mesh.position.y += (emptySpaces + 1) * CONFIG.spacing;
                    grid[x][newY] = block;
                }
            }
            setTimeout(() => {
                const matchData = findMatches();
                if (matchData.list.length > 0) {
                    processMatches(matchData);
                } else {
                    if (!hasPossibleMoves()) {
                        fixBoard();
                    } else {
                        gameState = STATE.IDLE;
                        updateHint();
                    }
                }
            }, 500);
        }

        function updateScore(points) {
            score += points;
            document.getElementById('score-display').innerText = score;
        }

        /** HINT SYSTEM */
        function updateHint() {
            clearHint();
            if (!showHint || gameState !== STATE.IDLE) return;

            const move = findValidMove();
            if (move) {
                hintMove = move;
                const b1 = grid[move.x1][move.y1];
                const b2 = grid[move.x2][move.y2];

                if (b1 && b2) {
                    const wf1 = new THREE.LineSegments(lineGeo, hintMaterial);
                    const wf2 = new THREE.LineSegments(lineGeo, hintMaterial);
                    b1.mesh.add(wf1);
                    b2.mesh.add(wf2);
                    b1.hintWireframe = wf1;
                    b2.hintWireframe = wf2;
                    hintWireframes = [wf1, wf2];
                }
            }
        }

        function clearHint() {
            hintWireframes.forEach(wf => {
                if (wf.parent) wf.parent.remove(wf);
            });
            hintWireframes = [];
            hintMove = null;
        }

        /** AUTO-PLAY SYSTEM */
        function startAutoPlay() {
            stopAutoPlay();

            document.getElementById('auto-status').classList.add('active');
            document.getElementById('auto-status-text').innerText = 'Auto Playing...';

            autoPlayInterval = setInterval(() => {
                if (gameState === STATE.IDLE) {

                    if (move) {
                        const b1 = grid[move.x1][move.y1];

                        if (b1 && b2) {
                            attemptSwap(b1, b2);
                        }
                    } else {
                        fixBoard();
                    }
                }

        }

        }

        /** 3D PARTICLES */
        const particles = []; const miniGeo = new THREE.BoxGeometry(0.25, 0.25, 0.25);

        function spawnVoxelExplosion(position, charKey) {
            for(let x = -1; x <= 1; x++) {
                for(let y = -1; y <= 1; y++) {
                    for(let z = -1; z <= 1; z++) {
                        if(x === 0 && y === 0 && z === 0) continue;
                        if(Math.random() > 0.5) continue;
                        const mesh = new THREE.Mesh(miniGeo, materials[charKey]);
                        mesh.position.copy(position).add(new THREE.Vector3(x*0.25, y*0.25, z*0.25));
                        const velocity = new THREE.Vector3(
                            x*(Math.random()*0.15),
                            y*(Math.random()*0.15)+0.15,
                            z*(Math.random()*0.15)
                        );
                        const rotSpeed = new THREE.Vector3(
                            Math.random()*0.3, Math.random()*0.3, Math.random()*0.3
                        );
                        scene.add(mesh);
                        particles.push({ mesh, velocity, rotSpeed, charKey, life: 600 });
                    }
                }
            }
        }

        function update3DParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.velocity.y -= 0.012;
                p.mesh.position.add(p.velocity);
                p.mesh.rotation.x += p.rotSpeed.x;
                p.mesh.rotation.y += p.rotSpeed.y;
                p.mesh.rotation.z += p.rotSpeed.z;
                p.life--;
                if (p.mesh.position.y < -12 || p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        /** GAME INPUT HANDLING */
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedBlock = null;
        container.addEventListener('touchstart', (e) => e.preventDefault(), {passive: false});

        container.addEventListener('pointerdown', (event) => {
            if (gameState !== STATE.IDLE || autoPlay) return;

            const rect = container.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            let intersectObjects = [];
            boardGroup.children.forEach(g => {
                if(g.type === 'Group') intersectObjects.push(g.children[0]);
            });
            const intersects = raycaster.intersectObjects(intersectObjects);

            if (intersects.length > 0) {
                const block = intersects[0].object.parent.userData.block;
                if (!block) return;
                if (!selectedBlock) {
                    selectedBlock = block;
                    highlightMesh.position.copy(block.mesh.position).add(boardGroup.position);
                    highlightMesh.visible = true;
                } else {
                    const isAdjacent = Math.abs(selectedBlock.gridX - block.gridX) +
                                      Math.abs(selectedBlock.gridY - block.gridY) === 1;
                    if (isAdjacent) attemptSwap(selectedBlock, block);
                    selectedBlock = null;
                    highlightMesh.visible = false;
                }
            } else {
                selectedBlock = null;
                highlightMesh.visible = false;
            }
        });

        function attemptSwap(b1, b2) {
		    gameState = STATE.SWAPPING;
		    lastInteraction = { x: b2.gridX, y: b2.gridY };
		
		    // 1. Store the ORIGINAL positions of both blocks
		    const orig1X = b1.gridX, orig1Y = b1.gridY;
		    const orig2X = b2.gridX, orig2Y = b2.gridY;
		
		    // 2. Perform the initial swap in the grid array
		    grid[orig1X][orig1Y] = b2;
		    grid[orig2X][orig2Y] = b1;
		
		    // 3. Update the block objects to their new positions
		    b1.setGridPos(orig2X, orig2Y);
		    b2.setGridPos(orig1X, orig1Y);
		
		    let colorBombUsed = false, blocksToDestroy = new Set();
		    if (b1.powerup === 'color') {
		        colorBombUsed = true;
		        blocksToDestroy = destroyColor(b2.charKey);
		        blocksToDestroy.add(b1);
		    }
		    else if (b2.powerup === 'color') {
		        colorBombUsed = true;
		        blocksToDestroy = destroyColor(b1.charKey);
		        blocksToDestroy.add(b2);
		    }
		
		    setTimeout(() => {
		        if (colorBombUsed) {
		            executeDestruction(Array.from(blocksToDestroy));
		        } else {
		            const matchData = findMatches();
		            if (matchData.list.length > 0) {
		                processMatches(matchData);
		            } else {
		                // --- SWAP BACK LOGIC ---
		                // 4. Move them back to their saved ORIGINAL positions
		                grid[orig1X][orig1Y] = b1;
		                grid[orig2X][orig2Y] = b2;
		                
		                b1.setGridPos(orig1X, orig1Y);
		                b2.setGridPos(orig2X, orig2Y);
		
		                setTimeout(() => { gameState = STATE.IDLE; }, 300);
		            }
		        }
		    }, 300);
		}

        document.getElementById('image-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const res = parseInt(document.getElementById('import-res').value);
            const keepBg = document.getElementById('import-keep-bg').checked;
            const processCanvas = document.getElementById('hidden-process-canvas');
            processCanvas.width = res;
            processCanvas.height = res;
            const pCtx = processCanvas.getContext('2d', { willReadFrequently: true });

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    pCtx.clearRect(0, 0, res, res);
                    pCtx.drawImage(img, 0, 0, res, res);
                    const imgData = pCtx.getImageData(0, 0, res, res).data;
                    const palette = [];
                    const threshold = 50;

                    for (let i = 0; i < imgData.length; i += 4) {
                        if (imgData[i + 3] < 128) continue;

                        const r = imgData[i], g = imgData[i+1], b = imgData[i+2];

                        const isNewColor = palette.every(p => {
                            const dist = Math.sqrt((r-p[0])**2 + (g-p[1])**2 + (b-p[2])**2);
                            return dist > threshold;
                        });

                        if (isNewColor && palette.length < 10) {
                            palette.push([r, g, b]);
                        }

                        if (palette.length >= 10) break;
                    }

                    let jsonArray = [];
                    for (let y = 0; y < res; y++) {
                        let rowStr = '';
                        for (let x = 0; x < res; x++) {
                            const idx = (y * res + x) * 4;
                            const r = imgData[idx], g = imgData[idx+1], b = imgData[idx+2], a = imgData[idx+3];

                            if (a < 10) {
                                rowStr += keepBg ? 'k' : '_';
                            } else {
                                let minVal = Infinity, bestIdx = 0;
                                palette.forEach((pColor, pIdx) => {
                                    const distance = Math.sqrt(
                                        Math.pow(r - pColor[0], 2) +
                                        Math.pow(g - pColor[1], 2) +
                                        Math.pow(b - pColor[2], 2)
                                    );
                                    if (distance < minVal) {
                                        minVal = distance;
                                        bestIdx = pIdx;
                                    }
                                });
                                rowStr += getChar(bestIdx);
                            }
                        }
                        jsonArray.push(`  "${rowStr}"`);
                    }

                    let newPalette = [];
                    palette.forEach((color, i) => {
                        newPalette.push(`  "${getChar(i)}": {"hex": "${`#${color[0].toString(16).padStart(2,'0')}${color[1].toString(16).padStart(2,'0')}${color[2].toString(16).padStart(2,'0')}`}", "rgb": {"r": ${color[0]}, "g": ${color[1]}, "b": ${color[2]}}}`)
                    });

                    document.getElementById('json-export-area').value = `{\n  "palette":{\n  ${newPalette.join(',\n  ')}\n  },\n  "art":[\n  ${jsonArray.join(',\n  ')}\n  ]\n}`;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('btn-copy-json').addEventListener('click', () => {
            document.getElementById('json-export-area').select();
            document.execCommand('copy');
        });

        document.getElementById('btn-play-custom').addEventListener('click', () => {
            const btn = document.getElementById('btn-play-custom');
            const area = document.getElementById('json-export-area');

            try {
                let parsed = JSON.parse(area.value);
                if (parsed.art && parsed.art.length > 0) {
                    currentLevelName = "Custom Upload Art";
                    currentGridSize = CONFIG.gridSize;

                    autoPlay = document.getElementById('auto-play-toggle').checked;
                    showHint = document.getElementById('show-hint-toggle').checked;

                    importerModal.style.display = 'none';
                    document.getElementById('start-screen').style.display = 'none';
                    loadLevelArt(parsed);
                    initBoard();
                    setTimeout(onWindowResize, 100);

                    if (autoPlay) {
                        setTimeout(startAutoPlay, 1000);
                    }
                }
            } catch(e) {
                console.error("JSON Parse Error:", e);
                const originalText = btn.innerText;
                btn.innerText = "Invalid JSON!";
                btn.style.backgroundColor = "#ff3333";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = "";
                }, 1500);
            }
        });

        // Initialize toggle states from localStorage
        document.getElementById('auto-play-toggle').addEventListener('change', (e) => {
            autoPlay = e.target.checked;
            if (autoPlay && gameState === STATE.IDLE) {
                startAutoPlay();
            } else if (!autoPlay) {
                stopAutoPlay();
            }
            localStorage.setItem('voxelCrash_autoplay', autoPlay);
        });

        document.getElementById('show-hint-toggle').addEventListener('change', (e) => {
            showHint = e.target.checked;
            if (!showHint) clearHint();
            else if (gameState === STATE.IDLE) updateHint();
            localStorage.setItem('voxelCrash_showhint', showHint);
        });

        // Load saved preferences
        const savedAutoPlay = localStorage.getItem('voxelCrash_autoplay') === 'true';
        const savedShowHint = localStorage.getItem('voxelCrash_showhint') === 'true';
        document.getElementById('auto-play-toggle').checked = savedAutoPlay;
        document.getElementById('show-hint-toggle').checked = savedShowHint;
        autoPlay = savedAutoPlay;
        showHint = savedShowHint;

        // Initialize
        animate();
    </script>
</body>
</html>
