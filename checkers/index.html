        /* Base Layout */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        .hidden { display: none !important; }
        .interactive { pointer-events: auto; }

        /* 3D Canvas */
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Setup Modal Layout */
        .layout-fullscreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; }
        .setup-modal { display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,1); }
        .setup-content { display: flex; flex-direction: column; width: 350px; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }

        /* Game UI Layout */
        .game-ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* Top Status Bar */
        .top-bar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 15px; }

        /* Win/Sweep Overlay */
        .win-overlay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; }

        /* Chat Box Layout */
        .chat-panel { position: absolute; bottom: 20px; right: 20px; width: 320px; display: flex; flex-direction: column; }
        .chat-header { display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .chat-input-area { display: flex; }
        .chat-input-area input { flex: 1; }

<body onload="document.getElementById('room-id').value = Math.floor(Math.random() * (99999 - 10000 + 1)) + 10000; document.getElementById('room-id-display').value=document.getElementById('room-id').value">

    <!-- 3D Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Setup Modal -->
    <div id="setup-ui" class="layout-fullscreen setup-modal interactive">
        <div class="setup-content">
            <h2 class="setup-title">3D Checkers Arena</h2>

            <div class="form-group">
                <label>WSS+MQTT Broker</label>
                <input type="text" id="broker-url" value="wss://test.mosquitto.org:8081">
                <small>Other great options: wss://broker.emqx.io:8084/mqtt, wss://broker.hivemq.com:8884/mqtt</small>
            </div>

            <div class="form-group">
                <label>Room ID</label>
                <input type="text" id="room-id" value="error" onchange="document.getElementById('room-id-display').value=this.value">
            </div>

            <div class="form-group">
                <label>Role</label>
                <select id="player-role">
                    <option value="1">Player 1 (Red)</option>
                    <option value="2">Player 2 (Black)</option>
                    <option value="0">Spectator</option>
                </select>
            </div>

            <div class="form-group">
                <label>Custom Image</label>
                <input type="text" id="custom-image" placeholder="https://example.com/image.jpg">
            </div>

            <button id="connect-btn" class="connect-btn">Connect & Play</button>
        </div>
    </div>

    <!-- In-Game UI -->
    <div id="game-ui" class="game-ui-layer hidden">

        <!-- Status Bar -->
        <div class="top-bar interactive">
            <div id="room-id-display" class="turn-text">---</div>
            <div class="divider">|</div>
            <div id="turn-indicator" class="turn-text">Waiting for sync...</div>
            <div class="divider">|</div>
            <div id="role-display" class="role-text">Spectator</div>
        </div>

        <!-- Win/Sweep Overlay -->
        <div id="win-overlay" class="win-overlay hidden">
            <h2 id="win-text" class="win-title">Player 1 Wins!</h2>
            <p class="win-subtitle">Initiating sweep protocol...</p>
        </div>

        <!-- Chat Box -->
        <div class="chat-panel interactive">
            <div class="chat-header">
                <span>Lobby Chat</span>
                <span id="connection-status" class="status-text">Connecting...</span>
            </div>
            <div id="chat-messages" class="chat-messages">
                <!-- Messages go here -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button id="chat-send">Send</button>
            </div>
        </div>

    </div>

    <script>
        // --- GAME STATE & GLOBALS ---
        let mqttClient;
        let roomTopic = "";
        let presenceTopic = "";
        let myRole = 0; // 1 = P1, 2 = P2, 0 = Spec
        let myCustomImage = "";
        let gameStarted = false; // Flag to prevent restart on connection drop

        let playerImages = { 1: "", 2: "" }; // Ephemeral, tied to active presence

        let gameState = {
            board: null,
            turn: 1,
            winner: 0
        };

        // --- THREE.JS GLOBALS ---
        let scene, camera, renderer;
        let boardGroup = new THREE.Group();
        let pieceMeshes = {};
        let particleSystem = [];
        let sweeper = { active: false, mesh: null, z: 0, speed: 0.15 };

        const squareSize = 2;
        const boardOffset = (8 * squareSize) / 2 - (squareSize / 2);

        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let selectedPieceId = null;
        let validMoves = [];
        let moveHighlightMeshes = [];

        // --- INITIALIZATION & PRESENCE LOCKING ---
        function initInitialState() {
            let board = Array(8).fill(null).map(() => Array(8).fill(null));
            // P1 pieces at z=-7 side (rows 0,1,2)
            for(let r=0; r<3; r++) {
                for(let c=0; c<8; c++) {
                    if((r+c)%2 !== 0) board[r][c] = { p: 1, k: false, id: `p1_${r}_${c}` };
                }
            }
            // P2 pieces at z=+7 side (rows 5,6,7)
            for(let r=5; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if((r+c)%2 !== 0) board[r][c] = { p: 2, k: false, id: `p2_${r}_${c}` };
                }
            }
            gameState.board = board;
        }

        document.getElementById('connect-btn').addEventListener('click', () => {
            const btn = document.getElementById('connect-btn');
            btn.disabled = true;
            btn.innerText = "Checking lobby...";

            const broker = document.getElementById('broker-url').value;
            roomTopic = "checkers3d_arena/" + document.getElementById('room-id').value;
            myRole = parseInt(document.getElementById('player-role').value);
            myCustomImage = document.getElementById('custom-image').value.trim();
            presenceTopic = roomTopic + '/presence/p' + myRole;

            connectAndCheckRole(broker);
        });

        function connectAndCheckRole(brokerUrl) {
            let options = {};

            // If joining as a player, set a Last Will and Testament to clear our slot and image if we disconnect
            if (myRole !== 0) {
                options.will = {
                    topic: presenceTopic,
                    payload: JSON.stringify({ status: 'offline' }),
                    retain: true
                };
            }

            mqttClient = mqtt.connect(brokerUrl, options);

            mqttClient.on('connect', () => {
                document.getElementById('connection-status').innerText = "Connected";

                // If this is a reconnect after a drop, just resubscribe, skip setup
                if (gameStarted) {
                    mqttClient.subscribe(roomTopic + '/state');
                    mqttClient.subscribe(roomTopic + '/chat');
                    mqttClient.subscribe(roomTopic + '/presence/+');

                    // Re-broadcast our active presence
                    if (myRole !== 0) {
                        mqttClient.publish(presenceTopic, JSON.stringify({ status: 'online', image: myCustomImage }), { retain: true });
                    }
                    return;
                }

                if (myRole === 0) {
                    // Spectator bypasses presence check
                    finalizeConnection();
                } else {
                    // Check if role is taken
                    mqttClient.subscribe(presenceTopic);

                    let roleTaken = false;

                    const presenceHandler = (topic, message) => {
                        if (topic === presenceTopic) {
                            try {
                                let data = JSON.parse(message.toString());
                                if (data.status === 'online') roleTaken = true;
                            } catch(e) {}
                        }
                    };

                    mqttClient.on('message', presenceHandler);

                    // Wait 500ms to see if anyone is broadcasting 'online'
                    setTimeout(() => {
                        mqttClient.removeListener('message', presenceHandler);

                        if (roleTaken) {
                            alert(`Player ${myRole} is already active in this room!`);
                            mqttClient.end();
                            const btn = document.getElementById('connect-btn');
                            btn.disabled = false;
                            btn.innerText = "Connect & Play";
                        } else {
                            // Role is free, claim it and broadcast our image instantly
                            finalizeConnection();
                        }
                    }, 500);
                }
            });

            mqttClient.on('offline', () => {
                document.getElementById('connection-status').innerText = "Disconnected...";
            });
        }

        function finalizeConnection() {
            gameStarted = true;
            document.getElementById('setup-ui').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');

            let roleName = myRole === 1 ? 'Player 1 (Red)' : myRole === 2 ? 'Player 2 (Black)' : 'Spectator';
            document.getElementById('role-display').innerText = roleName;

            mqttClient.subscribe(roomTopic + '/state');
            mqttClient.subscribe(roomTopic + '/chat');
            mqttClient.subscribe(roomTopic + '/presence/+'); // Listen to all presence updates for images

            // Publish our presence to bind our image to our connection
            if (myRole !== 0) {
                mqttClient.publish(presenceTopic, JSON.stringify({ status: 'online', image: myCustomImage }), { retain: true });
            }

            // Handle incoming messages
            mqttClient.on('message', (topic, message) => {
                try {
                    if (topic.endsWith('/state')) {
                        handleStateUpdate(JSON.parse(message.toString()));
                    } else if (topic.endsWith('/chat')) {
                        let payload = JSON.parse(message.toString());
                        addChatMessage(payload.sender, payload.text);
                    } else if (topic.includes('/presence/p')) {
                        handlePresenceUpdate(topic, JSON.parse(message.toString()));
                    }
                } catch(e) {}
            });

            // If joining as a player, init board if needed
            if (myRole !== 0) {
                initInitialState();
                publishState(); // Broadcast the initial board layout
            }

            initThreeJS();
            addChatMessage("System", `Connected to room.`);
        }

        // --- MQTT CHAT & STATE SYNC ---
        function publishState() {
            if(!mqttClient || !mqttClient.connected) return;
            mqttClient.publish(roomTopic + '/state', JSON.stringify(gameState), { retain: true });
        }

        function publishChat(text) {
            if(!mqttClient || !mqttClient.connected || !text.trim()) return;
            let sender = myRole === 1 ? "Player 1" : myRole === 2 ? "Player 2" : "Spectator";
            mqttClient.publish(roomTopic + '/chat', JSON.stringify({ sender, text }));
        }

        function handlePresenceUpdate(topic, data) {
            // Extract player number from topic (e.g. .../presence/p1 -> 1)
            let p = topic.endsWith('p1') ? 1 : 2;

            if (data.status === 'online') {
                playerImages[p] = data.image || "";
            } else {
                playerImages[p] = ""; // Clear image when they disconnect
            }

            updatePieceImages();
        }

        document.getElementById('chat-send').addEventListener('click', () => {
            let input = document.getElementById('chat-input');
            publishChat(input.value);
            input.value = '';
        });
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') document.getElementById('chat-send').click();
        });

        function addChatMessage(sender, text) {
            let chatBox = document.getElementById('chat-messages');
            let msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message';
            msgDiv.innerHTML = `<strong>${sender}:</strong> <span>${text}</span>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- THREE.JS SETUP & RENDERING ---
        function initThreeJS() {
            const canvas = document.getElementById('game-canvas');
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);

            // Player Pieces at Bottom Camera setup:
            // P1 pieces are at z=-7. To see them at bottom, camera goes to z=-22 looking at 0.
            // P2 pieces are at z=+7. To see them at bottom, camera goes to z=+22 looking at 0.
            if (myRole === 1) {
                camera.position.set(0, 18, -22);
            } else if (myRole === 2) {
                camera.position.set(0, 18, 22);
            } else {
                camera.position.set(25, 20, 0);
            }
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            scene.add(dirLight);

            createBoard();

            window.addEventListener('resize', onWindowResize, false);
            canvas.addEventListener('mousedown', onPointerDown, false);

            animate();
        }

        function createBoard() {
            scene.add(boardGroup);
            const borderGeo = new THREE.BoxGeometry(squareSize * 8 + 1, 1, squareSize * 8 + 1);
            const borderMat = new THREE.MeshPhongMaterial({ color: 0x3d2314 });
            const border = new THREE.Mesh(borderGeo, borderMat);
            border.position.y = -0.5;
            boardGroup.add(border);

            const darkMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const lightMat = new THREE.MeshPhongMaterial({ color: 0xdddddd });

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const isDark = (r + c) % 2 !== 0;
                    const geo = new THREE.BoxGeometry(squareSize, 0.2, squareSize);
                    const mesh = new THREE.Mesh(geo, isDark ? darkMat : lightMat);

                    let pos = getBoardWorldPos(r, c);
                    mesh.position.set(pos.x, 0, pos.z);
                    mesh.userData = { isSquare: true, r: r, c: c, isDark: isDark };
                    boardGroup.add(mesh);
                }
            }
        }

        function getBoardWorldPos(r, c) {
            return {
                x: c * squareSize - boardOffset,
                z: r * squareSize - boardOffset
            };
        }

        function loadCustomTexture(url, fallbackColor) {
            const material = new THREE.MeshPhongMaterial({ color: fallbackColor });
            if (url && url.startsWith('http')) {
                const loader = new THREE.TextureLoader();
                loader.setCrossOrigin('Anonymous');
                loader.load(url,
                    (texture) => {
                        material.map = texture;
                        material.color.setHex(0xffffff);
                        material.needsUpdate = true;
                    }
                );
            }
            return material;
        }

        function createPieceMesh(pieceData) {
            const radius = squareSize * 0.4;
            const height = 0.4;
            const geo = new THREE.CylinderGeometry(radius, radius, height, 32);

            let p = pieceData.p;
            let baseColor = p === 1 ? 0xcc0000 : 0x444444;
            let imgUrl = playerImages[p];

            // Apply custom image ONLY to the top face
            const sideMat = new THREE.MeshPhongMaterial({ color: baseColor });
            const topMat = loadCustomTexture(imgUrl, baseColor);
            const bottomMat = new THREE.MeshPhongMaterial({ color: baseColor });

            // Materials array: 0=side, 1=top, 2=bottom
            const mesh = new THREE.Mesh(geo, [sideMat, topMat, bottomMat]);
            mesh.castShadow = true;
            mesh.userData = { id: pieceData.id, p: p, isKing: pieceData.k, imageUrl: imgUrl };

            // Rotate the mesh so the image faces the owning player upright.
            // P1 camera is at z=-22 looking +z. P2 camera is at z=22 looking -z.
            mesh.rotation.y = p === 1 ? -Math.PI / 2 : Math.PI / 2 ;

            // Decorative Ridge
            const torusGeo = new THREE.TorusGeometry(radius, 0.05, 16, 32);
            const torusMat = new THREE.MeshPhongMaterial({ color: p === 1 ? 0xaa0000 : 0x111111 });
            const ridge1 = new THREE.Mesh(torusGeo, torusMat);
            ridge1.rotation.x = Math.PI / 2;
            ridge1.position.y = height / 2;
            mesh.add(ridge1);

            if(pieceData.k) makeKingVisual(mesh);

            return mesh;
        }

        function updatePieceImages() {
            // Hot-swap images without recreating meshes if presence updates
            for (let id in pieceMeshes) {
                let mesh = pieceMeshes[id];
                let p = mesh.userData.p;
                let newUrl = playerImages[p];

                if (mesh.userData.imageUrl !== newUrl) {
                    mesh.userData.imageUrl = newUrl;
                    let baseColor = p === 1 ? 0xcc0000 : 0x444444;
                    mesh.material[1] = loadCustomTexture(newUrl, baseColor);
                }
            }
        }

        function makeKingVisual(mesh) {
            if(mesh.userData.hasCrown) return;
            const crownGeo = new THREE.CylinderGeometry(0.5, 0.7, 0.4, 16);
            const crownMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
            const crown = new THREE.Mesh(crownGeo, crownMat);
            crown.position.y = 0.4;
            mesh.add(crown);
            mesh.userData.hasCrown = true;
            mesh.userData.isKing = true;
        }

        // --- GAME LOGIC & STATE SYNC ---
        function handleStateUpdate(newState) {
            // Ignore corrupted state
            if(!newState || !newState.board) return;

            gameState = newState;
            document.getElementById('turn-indicator').innerText = gameState.turn === 1 ? "Player 1's Turn" : "Player 2's Turn";

            sync3DPieces();

            if (gameState.winner !== 0 && !sweeper.active) {
                triggerSweep(gameState.winner);
            }
            clearSelection();
        }

        function sync3DPieces() {
            let activeIds = new Set();

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    let piece = gameState.board[r][c];
                    if (piece) {
                        activeIds.add(piece.id);
                        let mesh = pieceMeshes[piece.id];

                        if (!mesh) {
                            mesh = createPieceMesh(piece);
                            scene.add(mesh);
                            pieceMeshes[piece.id] = mesh;

                            let pos = getBoardWorldPos(r, c);
                            mesh.position.set(pos.x, 0.4, pos.z);
                        } else {
                            let pos = getBoardWorldPos(r, c);
                            mesh.userData.targetPos = new THREE.Vector3(pos.x, 0.4, pos.z);
                            if (piece.k && !mesh.userData.isKing) makeKingVisual(mesh);
                        }
                    }
                }
            }

            for (let id in pieceMeshes) {
                if (!activeIds.has(id)) {
                    triggerExplosion(pieceMeshes[id]);
                    scene.remove(pieceMeshes[id]);
                    delete pieceMeshes[id];
                }
            }
        }

        // --- INTERACTION ---
        function onPointerDown(event) {
            if (gameState.winner !== 0) return;
            if (myRole !== gameState.turn) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const highlightIntersects = raycaster.intersectObjects(moveHighlightMeshes);
            if (highlightIntersects.length > 0) {
                const targetSquare = highlightIntersects[0].object.userData;
                executeMove(selectedPieceId, targetSquare.r, targetSquare.c, targetSquare.jumpData);
                return;
            }

            const intersects = raycaster.intersectObjects(scene.children, true);
            for (let i = 0; i < intersects.length; i++) {
                let obj = intersects[i].object;
                if (obj.userData.id) {
                    while(obj.parent && obj.parent !== scene) obj = obj.parent;
                    if (obj.userData.p === myRole) {
                        selectPiece(obj.userData.id);
                        return;
                    }
                }
            }
            clearSelection();
        }

        function selectPiece(id) {
            clearSelection();
            selectedPieceId = id;

            let mesh = pieceMeshes[id];
            if(mesh) mesh.position.y = 0.8;

            let r, c;
            for(let i=0; i<8; i++) for(let j=0; j<8; j++) {
                if(gameState.board[i][j] && gameState.board[i][j].id === id) {
                    r = i; c = j; break;
                }
            }
            if(r !== undefined) showValidMoves(r, c, mesh.userData.p, mesh.userData.isKing);
        }

        function clearSelection() {
            if (selectedPieceId && pieceMeshes[selectedPieceId]) pieceMeshes[selectedPieceId].position.y = 0.4;
            selectedPieceId = null;
            moveHighlightMeshes.forEach(m => scene.remove(m));
            moveHighlightMeshes = [];
        }

        function showValidMoves(r, c, player, isKing) {
            const dir = player === 1 ? 1 : -1;

            const checkAndAdd = (endR, endC, jumpData = null) => {
                if(endR >= 0 && endR < 8 && endC >= 0 && endC < 8 && !gameState.board[endR][endC]) {
                    addHighlight(endR, endC, jumpData);
                }
            };

            const directions = [{ dr: dir, dc: -1 }, { dr: dir, dc: 1 }];
            if (isKing) directions.push({ dr: -dir, dc: -1 }, { dr: -dir, dc: 1 });

            directions.forEach(d => {
                let step1R = r + d.dr, step1C = c + d.dc;
                if(step1R >= 0 && step1R < 8 && step1C >= 0 && step1C < 8) {
                    if(!gameState.board[step1R][step1C]) {
                        checkAndAdd(step1R, step1C);
                    } else if (gameState.board[step1R][step1C].p !== player) {
                        let step2R = step1R + d.dr, step2C = step1C + d.dc;
                        if(step2R >= 0 && step2R < 8 && step2C >= 0 && step2C < 8 && !gameState.board[step2R][step2C]) {
                            checkAndAdd(step2R, step2C, { midR: step1R, midC: step1C });
                        }
                    }
                }
            });
        }

        function addHighlight(r, c, jumpData) {
            const geo = new THREE.CylinderGeometry(squareSize*0.4, squareSize*0.4, 0.1, 32);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.5 });
            const mesh = new THREE.Mesh(geo, mat);

            let pos = getBoardWorldPos(r, c);
            mesh.position.set(pos.x, 0.2, pos.z);
            mesh.userData = { r, c, jumpData };
            scene.add(mesh);
            moveHighlightMeshes.push(mesh);
        }

        function executeMove(id, endR, endC, jumpData) {
            let startR, startC, pieceData;
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
                if(gameState.board[r][c] && gameState.board[r][c].id === id) {
                    startR = r; startC = c; pieceData = gameState.board[r][c];
                }
            }

            gameState.board[startR][startC] = null;
            gameState.board[endR][endC] = pieceData;

            if (jumpData) gameState.board[jumpData.midR][jumpData.midC] = null;

            if (pieceData.p === 1 && endR === 7) pieceData.k = true;
            if (pieceData.p === 2 && endR === 0) pieceData.k = true;

            let p1Count = 0, p2Count = 0;
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
                if(gameState.board[r][c]) {
                    if(gameState.board[r][c].p === 1) p1Count++;
                    if(gameState.board[r][c].p === 2) p2Count++;
                }
            }
            if (p1Count === 0) gameState.winner = 2;
            else if (p2Count === 0) gameState.winner = 1;

            if (gameState.winner === 0) gameState.turn = gameState.turn === 1 ? 2 : 1;

            publishState();
            clearSelection();
        }

        // --- SPECIAL EFFECTS ---
        function triggerExplosion(mesh) {
            const particleCount = 20;
            const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const mat = mesh.material[0].clone(); // Use side material

            for(let i=0; i<particleCount; i++) {
                const particle = new THREE.Mesh(geo, mat);
                particle.position.copy(mesh.position);

                particle.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.4,
                    Math.random() * 0.5 + 0.2,
                    (Math.random() - 0.5) * 0.4
                );
                particle.userData.rotSpeed = new THREE.Vector3(
                    Math.random() * 0.2, Math.random() * 0.2, Math.random() * 0.2
                );

                scene.add(particle);
                particleSystem.push(particle);
            }
        }

        function triggerSweep(winner) {
            sweeper.active = true;

            const overlay = document.getElementById('win-overlay');
            overlay.classList.remove('hidden');
            document.getElementById('win-text').innerText = `Player ${winner} Wins!`;

            const barGeo = new THREE.CylinderGeometry(1, 1, 20, 32);
            const barMat = new THREE.MeshStandardMaterial({ color: 0x88aaee });
            sweeper.mesh = new THREE.Mesh(barGeo, barMat);
            sweeper.mesh.rotation.z = Math.PI / 2;

            sweeper.z = -15;
            sweeper.mesh.position.set(0, 1, sweeper.z);
            scene.add(sweeper.mesh);
        }

        // --- RENDER LOOP ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            for(let id in pieceMeshes) {
                let mesh = pieceMeshes[id];
                if (mesh.userData.targetPos && id !== selectedPieceId) {
                    mesh.position.lerp(mesh.userData.targetPos, 0.1);
                }
            }

            for(let i = particleSystem.length - 1; i >= 0; i--) {
                let p = particleSystem[i];
                p.position.add(p.userData.velocity);
                p.rotation.x += p.userData.rotSpeed.x;
                p.rotation.y += p.userData.rotSpeed.y;
                p.userData.velocity.y -= 0.02;

                if (p.position.y < -5) {
                    scene.remove(p);
                    particleSystem.splice(i, 1);
                }
            }

            if (sweeper.active && sweeper.mesh) {
                sweeper.z += sweeper.speed;
                sweeper.mesh.position.z = sweeper.z;
                sweeper.mesh.rotation.x += 0.1;

                for(let id in pieceMeshes) {
                    let mesh = pieceMeshes[id];
                    if (Math.abs(mesh.position.z - sweeper.z) < 1.5 && mesh.position.y > -5) {
                        mesh.userData.targetPos = null;
                        mesh.position.z = sweeper.z + 1.2;
                        mesh.position.y += Math.random() * 0.1;
                        mesh.rotation.x += Math.random() * 0.2;
                        mesh.rotation.z += Math.random() * 0.2;
                    }
                    if (Math.abs(mesh.position.x) > 9 || mesh.position.z > 9) {
                        mesh.position.y -= 0.2;
                    }
                }

                if (sweeper.z > 20) {
                    scene.remove(sweeper.mesh);
                    sweeper.active = false;
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
