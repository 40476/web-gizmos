name: Generate Atlases

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-atlas:
    # Only run if NOT a bot AND files in shared/ were changed
    # We use a check on the commit message or a path filter check
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check_files.outputs.changed }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes in shared/
        id: check_files
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^shared/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.check_files.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run atlas generator
        if: steps.check_files.outputs.changed == 'true'
        run: python .github/scripts/generate_atlas.py

      - name: Commit changes
        if: steps.check_files.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add shared/**/atlas.json
          if ! git diff --cached --quiet; then
            git commit -m "Update atlas.json files"
            git push
          fi
