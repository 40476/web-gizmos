<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>idk</title>
    <script src="../shared/js/header.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        h1 {
            color: #1d1d1f;
            border-bottom: 2px solid #d2d2d7;
            padding-bottom: 10px;
        }
        .control-group {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
        }
        input[type="file"] {
            margin-bottom: 15px;
        }
        audio {
            display: block;
            width: 100%;
            margin-bottom: 20px;
        }
        .button-container {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        button {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
        }
        button:hover {
            background-color: #0077ed;
        }
        button:disabled {
            background-color: #86868b;
            cursor: not-allowed;
        }
        #downloadBtn {
            background-color: #34c759;
        }
        #downloadBtn:hover {
            background-color: #30b651;
        }
        video {
            width: 100%;
            max-width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            background: #000;
        }
        #status {
            margin-top: 15px;
            font-style: italic;
            color: #515154;
        }
    </style>
    <script src="../shared/js/ffmpeg.min.js"></script>
</head>
<body>

    <h1>idk</h1>

    <div class="control-group">
        <label for="audioFile">Upload your MP3 audio</label>
        <input type="file" id="audioFile" accept="audio/mp3">
        
        <label>Audio Preview:</label>
        <audio id="audioPreview" controls></audio>
        
        <div class="button-container">
            <button id="processBtn" disabled>Mix Audio & Video</button>
            <button id="downloadBtn" disabled>Export & Download File</button>
        </div>
        <p id="status">Loading FFmpeg core library...</p>
    </div>

    <div class="control-group">
        <label>Video Player Preview:</label>
        <video id="videoPlayer" controls src="video.mp4"></video>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });
        
        const audioInput = document.getElementById('audioFile');
        const audioPreview = document.getElementById('audioPreview');
        const processBtn = document.getElementById('processBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusText = document.getElementById('status');
        const videoPlayer = document.getElementById('videoPlayer');

        let outputBlobUrl = null;

        async function loadFFmpeg() {
            try {
                await ffmpeg.load();
                statusText.innerText = "FFmpeg loaded! Ready to mix.";
            } catch (error) {
                statusText.innerText = "Error loading FFmpeg Core.";
                console.error(error);
            }
        }
        loadFFmpeg();

        // Listen for user uploading an MP3
        audioInput.addEventListener('change', () => {
            if (audioInput.files.length > 0) {
                const file = audioInput.files[0];
                // Generate a local URL to let the user play/preview their uploaded MP3
                audioPreview.src = URL.createObjectURL(file);
                processBtn.disabled = false;
                statusText.innerText = "Audio loaded. Ready to process!";
            }
        });

        async function fetchLocalAsset(url) {
            const response = await fetch(url, { method: 'GET', mode: 'same-origin' });
            if (!response.ok) throw new Error(`Failed to fetch ${url}`);
            const blob = await response.blob();
            return await fetchFile(blob);
        }

        processBtn.addEventListener('click', async () => {
            if (!audioInput.files.length) return;

            statusText.innerText = "Merging audio track at exactly 10.49 seconds... Please stay on this page.";
            processBtn.disabled = true;
            downloadBtn.disabled = true;

            const audioFile = audioInput.files[0];

            try {
                const videoData = await fetchLocalAsset('video.mp4');
                ffmpeg.FS('writeFile', 'input_video.mp4', videoData);
                ffmpeg.FS('writeFile', 'input_audio.mp3', await fetchFile(audioFile));

                /* - Filter Breakdown: 
                   [1:a]adelay=10490|10490[aud] -> Delays both left/right audio channels by 10490ms (10.49s)
                   [0:a][aud]amix=inputs=2:duration=first[a] -> Mixes video audio with delayed audio, ending when video ends.
                */
                await ffmpeg.run(
                    '-i', 'input_video.mp4',
                    '-i', 'input_audio.mp3',
                    '-filter_complex', '[1:a]adelay=10490|10490[aud];[0:a][aud]amix=inputs=2:duration=first[a]',
                    '-map', '0:v',
                    '-map', '[a]',
                    '-c:v', 'copy', 
                    '-c:a', 'aac',   
                    'output.mp4'
                );

                statusText.innerText = "Mixing successful! You can now preview or export your file.";

                const data = ffmpeg.FS('readFile', 'output.mp4');
                outputBlobUrl = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                // Update the main video element to let you preview the finished mix
                videoPlayer.src = outputBlobUrl;
                downloadBtn.disabled = false;

            } catch (err) {
                statusText.innerText = "Error processing media files.";
                console.error(err);
            } finally {
                processBtn.disabled = false;
            }
        });

        // Separate, standalone manual export trigger
        downloadBtn.addEventListener('click', () => {
            if (!outputBlobUrl) return;
            const downloadLink = document.createElement('a');
            downloadLink.href = outputBlobUrl;
            downloadLink.download = 'mixed_output_10.49s.mp4';
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        });
    </script>
</body>
</html>
