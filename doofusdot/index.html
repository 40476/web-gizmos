<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doofus Dot</title>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            background: #1a1a1a; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow: hidden; 
        }
        
        #ui-layer {
            position: absolute; 
            top: 15px; 
            left: 15px; 
            background: rgba(255, 255, 255, 0.95);
            padding: 20px; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            z-index: 100; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
            width: 220px;
        }

        .dot {
            position: absolute; 
            border-radius: 50%;
            /* Glide effect + scale transition */
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        width 0.3s ease, height 0.3s ease;
            pointer-events: none; 
            will-change: transform;
        }

        .row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        input, select, button { padding: 4px; border: 1px solid #ccc; border-radius: 4px; }
        h2 { margin: 0; font-size: 20px; color: #333; }
        button { 
            background: #4834d4; 
            color: white; 
            cursor: pointer; 
            border: none; 
            padding: 10px; 
            font-weight: bold;
            border-radius: 6px;
        }
        button:hover { background: #686de0; }
    </style>
</head>
<body>

<div id="ui-layer">
    <h2>Doofus Dot</h2>
    
    <div class="row">
        <label>Count:</label>
        <input type="number" id="dotCount" value="40" min="1" max="200">
    </div>

    <div class="row">
        <label>Mode:</label>
        <select id="colorMode">
            <option value="single">Solid</option>
            <option value="rainbow">Rainbow</option>
        </select>
    </div>

    <div id="pickerRow" class="row">
        <label>Color:</label>
        <input type="color" id="colorPicker" value="#f0932b">
    </div>

    <div class="row">
        <label>Sound:</label>
        <select id="soundSelect"></select>
    </div>

    <button id="applyBtn">Respawn Doofuses</button>
</div>

<div id="dot-container"></div>

<script>
    const container = document.getElementById('dot-container');
    const soundSelect = document.getElementById('soundSelect');
    const applyBtn = document.getElementById('applyBtn');
    const colorMode = document.getElementById('colorMode');
    const pickerRow = document.getElementById('pickerRow');
    
    const AUDIO_BASE = '../shared/audio/';
    let doofuses = [];
    const proximityLimit = 90;

    // Load atlas from the specific audio subfolder
    async function initSounds() {
        try {
            const response = await fetch(`${AUDIO_BASE}atlas.json`);
            const data = await response.json();
            
            soundSelect.innerHTML = ''; // Clear fallback
            data.forEach(file => {
                const opt = document.createElement('option');
                opt.value = `${AUDIO_BASE}${file.name}`;
                opt.textContent = file.name;
                
                // Default to bruh.mp3
                if (file.name === 'bruh.mp3') opt.selected = true;
                soundSelect.appendChild(opt);
            });
        } catch (e) {
            console.error("Path incorrect or atlas.json missing at " + AUDIO_BASE);
        }
    }

    function playEffect() {
        const audio = new Audio(soundSelect.value);
        audio.volume = 0.4;
        audio.play().catch(() => {}); 
    }

    class Doofus {
        constructor() {
            this.el = document.createElement('div');
            this.el.className = 'dot';
            this.size = 15;
            this.spawn();
            container.appendChild(this.el);
        }

        spawn() {
            this.x = Math.random() * (window.innerWidth - 50);
            this.y = Math.random() * (window.innerHeight - 50);
            
            const isRainbow = colorMode.value === 'rainbow';
            this.el.style.backgroundColor = isRainbow 
                ? `hsl(${Math.random() * 360}, 80%, 60%)` 
                : document.getElementById('colorPicker').value;
            
            this.updateStyles();
        }

        updateStyles() {
            this.el.style.width = `${this.size}px`;
            this.el.style.height = `${this.size}px`;
            this.el.style.transform = `translate(${this.x}px, ${this.y}px)`;
        }

        checkProximity(mx, my) {
            const dx = (this.x + this.size/2) - mx;
            const dy = (this.y + this.size/2) - my;
            const distance = Math.sqrt(dx*dx + dy*dy);

            if (distance < proximityLimit) {
                this.flee();
            }
        }

        flee() {
            // New random position
            this.x = Math.random() * (window.innerWidth - this.size);
            this.y = Math.random() * (window.innerHeight - this.size);
            
            // Growth Logic
            // this.size += 10;
            // if (this.size > 100) this.size = 15; // Reset if too big
            
            this.updateStyles();
            playEffect();
        }
    }

    function createNewSet() {
        container.innerHTML = '';
        doofuses = [];
        const count = document.getElementById('dotCount').value;
        for(let i=0; i < count; i++) {
            doofuses.push(new Doofus());
        }
    }

    // Event Listeners
    window.addEventListener('mousemove', (e) => {
        doofuses.forEach(d => d.checkProximity(e.clientX, e.clientY));
    });

    colorMode.addEventListener('change', () => {
        pickerRow.style.display = colorMode.value === 'rainbow' ? 'none' : 'flex';
    });

    applyBtn.addEventListener('click', createNewSet);

    // Run
    initSounds();
    createNewSet();
</script>

</body>
</html>
