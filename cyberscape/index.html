<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberscape</title>
    <script src="../shared/js/header.js"></script>
    <script src="../shared/js/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0ff;
            text-shadow: 2px 2px #f0f;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
            border: 1px solid #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #aaa;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px;
            border-left: 3px solid #f0f;
        }

        .overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.5) 100%);
        }
    </style>
</head>
<body>

    <div id="game-container"></div>
    <div class="overlay"></div>
    
    <div id="ui" hidden>
        <div id="time-display">00:00</div>
        <div id="status">AUTO-PILOT: ON</div>
    </div>

    <div id="controls-hint" hidden>
        WASD / ARROWS TO OVERRIDE | AUTO-SCROLL RESUMES AFTER 10s IDLE
    </div>

    <script>
        // Constants & Config
        const CHUNK_SIZE = 50; 
        const PIXEL_RATIO = 0.45;
        const AUTO_SCROLL_PAUSE_TIME = 10; 
        const COLORS = {
            buildingsNight: new THREE.Color(0x050505),
            buildingsDay: new THREE.Color(0x444444),
            neon: [0x00ffff, 0xff00ff, 0xffff00, 0x00ff00, 0xff0000],
            roadNight: new THREE.Color(0x020202),
            roadDay: new THREE.Color(0x1a1a1a),
            skyDay: 0x336688,
            skyNight: 0x010103
        };

        let scene, camera, renderer, clock;
        let cityGroup, trafficGroup;
        let timeOfDay = 0.2; 
        let moveSpeed = 0.12;
        let scrollOffset = { x: 0, z: 0 };
        let input = { w: false, a: false, s: false, d: false };
        let lastInputTime = 0;

        const chunks = new Map();
        const vehicles = [];
        const buildingMaterials = [];
        const groundMaterials = [];

        window.onload = init;

        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();

            const aspect = window.innerWidth / window.innerHeight;
            const d = 25;
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 2000);
            
            camera.position.set(100, 100, 100);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth * PIXEL_RATIO, window.innerHeight * PIXEL_RATIO);
            document.getElementById('game-container').appendChild(renderer.domElement);

            cityGroup = new THREE.Group();
            scene.add(cityGroup);

            trafficGroup = new THREE.Group();
            scene.add(trafficGroup);

            setupLights();
            setupInput();
            
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function setupLights() {
            const ambient = new THREE.AmbientLight(0xffffff, 0.15);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(100, 200, 100);
            sun.name = "sun";
            scene.add(sun);
        }

        function setupInput() {
            const keyMap = {
                'ArrowUp': 'w', 'w': 'w',
                'ArrowDown': 's', 's': 's',
                'ArrowLeft': 'a', 'a': 'a',
                'ArrowRight': 'd', 'd': 'd'
            };
            window.addEventListener('keydown', (e) => { 
                if(keyMap[e.key]) {
                    input[keyMap[e.key]] = true; 
                    lastInputTime = clock.elapsedTime;
                }
            });
            window.addEventListener('keyup', (e) => { 
                if(keyMap[e.key]) input[keyMap[e.key]] = false; 
            });
        }

        function createBuilding(x, z) {
            const h = 4 + Math.random() * 15;
            const w = 2 + Math.random() * 3;
            const d = 2 + Math.random() * 3;
            
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshPhongMaterial({ color: COLORS.buildingsNight.clone() });
            buildingMaterials.push(material);

            const building = new THREE.Mesh(geometry, material);
            building.position.set(x, h/2, z);
            
            if (Math.random() > 0.2) {
                const neonColor = COLORS.neon[Math.floor(Math.random() * COLORS.neon.length)];
                const isStrip = Math.random() > 0.5;
                
                if (isStrip) {
                    const neonGeo = new THREE.BoxGeometry(w + 0.1, 0.2, d + 0.1);
                    const neonMat = new THREE.MeshBasicMaterial({ color: neonColor });
                    const strip = new THREE.Mesh(neonGeo, neonMat);
                    strip.position.y = (Math.random() - 0.3) * h;
                    building.add(strip);
                } else {
                    const winGeo = new THREE.PlaneGeometry(0.4, 0.4);
                    const winMat = new THREE.MeshBasicMaterial({ color: neonColor });
                    for(let k=0; k<5; k++) {
                        const win = new THREE.Mesh(winGeo, winMat);
                        win.position.set(w/2 + 0.06, (Math.random()-0.5)*h, (Math.random()-0.5)*d);
                        win.rotation.y = Math.PI/2;
                        building.add(win);
                    }
                }
            }
            return building;
        }

        function createTraffic(x, z, horizontal = true) {
            const car = new THREE.Group();
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.5), bodyMat);
            car.add(body);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.4), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            head.position.set(0.4, 0, 0);
            car.add(head);

            const tail = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.4), new THREE.MeshBasicMaterial({ color: 0xff3300 }));
            tail.position.set(-0.4, 0, 0);
            car.add(tail);

            car.position.set(x, 0.3, z);
            if (!horizontal) car.rotation.y = Math.PI / 2;
            
            return {
                mesh: car,
                speed: (0.15 + Math.random() * 0.25) * (Math.random() > 0.5 ? 1 : -1),
                horizontal: horizontal
            };
        }

        function generateChunk(cx, cz) {
            const group = new THREE.Group();
            
            const groundGeo = new THREE.PlaneGeometry(CHUNK_SIZE + 1, CHUNK_SIZE + 1);
            const groundMat = new THREE.MeshPhongMaterial({ color: COLORS.roadNight.clone() });
            groundMaterials.push(groundMat);

            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.set(cx * CHUNK_SIZE, -0.01, cz * CHUNK_SIZE);
            group.add(ground);

            const grid = new THREE.GridHelper(CHUNK_SIZE, 10, 0x222222, 0x111111);
            grid.position.set(cx * CHUNK_SIZE, 0, cz * CHUNK_SIZE);
            group.add(grid);

            for (let i = -CHUNK_SIZE/2 + 5; i < CHUNK_SIZE/2 - 5; i += 8) {
                for (let j = -CHUNK_SIZE/2 + 5; j < CHUNK_SIZE/2 - 5; j += 8) {
                    if (Math.abs(i) > 4 && Math.abs(j) > 4) {
                        const b = createBuilding(cx * CHUNK_SIZE + i, cz * CHUNK_SIZE + j);
                        group.add(b);
                    } else {
                        if (Math.random() > 0.85) {
                            const v = createTraffic(cx * CHUNK_SIZE + i, cz * CHUNK_SIZE + j, Math.abs(i) < 4);
                            trafficGroup.add(v.mesh);
                            vehicles.push(v);
                        }
                    }
                }
            }

            cityGroup.add(group);
            return group;
        }

        function updateInfiniteGrid() {
            const curX = Math.round(scrollOffset.x / CHUNK_SIZE);
            const curZ = Math.round(scrollOffset.z / CHUNK_SIZE);

            for (let x = curX - 2; x <= curX + 2; x++) {
                for (let z = curZ - 2; z <= curZ + 2; z++) {
                    const key = `${x},${z}`;
                    if (!chunks.has(key)) {
                        chunks.set(key, generateChunk(x, z));
                    }
                }
            }

            for (const [key, chunk] of chunks) {
                const [cx, cz] = key.split(',').map(Number);
                if (Math.abs(cx - curX) > 3 || Math.abs(cz - curZ) > 3) {
                    // Cleanup materials from arrays to prevent memory leaks
                    chunk.traverse((child) => {
                        if (child.isMesh) {
                            const bIdx = buildingMaterials.indexOf(child.material);
                            if (bIdx > -1) buildingMaterials.splice(bIdx, 1);
                            const gIdx = groundMaterials.indexOf(child.material);
                            if (gIdx > -1) groundMaterials.splice(gIdx, 1);
                        }
                    });
                    cityGroup.remove(chunk);
                    chunks.delete(key);
                }
            }
        }

        function updateEnvironment(dt) {
            timeOfDay += dt * 0.01;
            if (timeOfDay > 1) timeOfDay = 0;

            const sun = scene.getObjectByName("sun");
            // Normalize sine wave to 0-1 for lerping
            const dayFactor = (Math.sin(timeOfDay * Math.PI * 2) + 1) / 2;
            const intensity = Math.max(0.05, Math.sin(timeOfDay * Math.PI * 2));
            sun.intensity = intensity;
            
            const hour = Math.floor(timeOfDay * 24).toString().padStart(2, '0');
            document.getElementById('time-display').innerText = `${hour}:00`;

            const skyColor = new THREE.Color().lerpColors(
                new THREE.Color(COLORS.skyNight),
                new THREE.Color(COLORS.skyDay),
                dayFactor
            );
            renderer.setClearColor(skyColor);

            // Dynamically brighten building and ground colors
            const currentBuildingColor = new THREE.Color().lerpColors(
                COLORS.buildingsNight,
                COLORS.buildingsDay,
                dayFactor
            );
            const currentGroundColor = new THREE.Color().lerpColors(
                COLORS.roadNight,
                COLORS.roadDay,
                dayFactor
            );

            buildingMaterials.forEach(mat => mat.color.copy(currentBuildingColor));
            groundMaterials.forEach(mat => mat.color.copy(currentGroundColor));

            for (let i = vehicles.length - 1; i >= 0; i--) {
                const v = vehicles[i];
                if (v.horizontal) v.mesh.position.x += v.speed;
                else v.mesh.position.z += v.speed;

                const dist = v.mesh.position.distanceTo(new THREE.Vector3(scrollOffset.x, 0, scrollOffset.z));
                if (dist > CHUNK_SIZE * 3) {
                    trafficGroup.remove(v.mesh);
                    vehicles.splice(i, 1);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const now = clock.elapsedTime;

            if (input.w) { scrollOffset.x -= moveSpeed; scrollOffset.z -= moveSpeed; }
            if (input.s) { scrollOffset.x += moveSpeed; scrollOffset.z += moveSpeed; }
            if (input.a) { scrollOffset.x -= moveSpeed; scrollOffset.z += moveSpeed; }
            if (input.d) { scrollOffset.x += moveSpeed; scrollOffset.z -= moveSpeed; }

            const timeSinceLastInput = now - lastInputTime;
            if (timeSinceLastInput > AUTO_SCROLL_PAUSE_TIME) {
                scrollOffset.x += moveSpeed * 0.4;
                scrollOffset.z += moveSpeed * 0.4;
                document.getElementById('status').innerText = "AUTO-PILOT: ON";
                document.getElementById('status').style.color = "#0ff";
            } else {
                document.getElementById('status').innerText = "MANUAL OVERRIDE";
                document.getElementById('status').style.color = "#f0f";
            }

            camera.position.set(scrollOffset.x + 80, 80, scrollOffset.z + 80);
            camera.lookAt(scrollOffset.x, 0, scrollOffset.z);

            updateInfiniteGrid();
            updateEnvironment(dt);

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            const d = 25;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth * PIXEL_RATIO, window.innerHeight * PIXEL_RATIO);
        }
    </script>
</body>
</html>
