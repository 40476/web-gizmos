<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>microViz</title>
    <!-- https://www.svgrepo.com/svg/377451/music -->
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
          --bg: #1a1a1a;
          --accent: #00ff9d;
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          background: var(--bg);
          color: white;
          font-family: monospace;
        }

        .container {
          max-width: 100vw;
          margin: 0 auto;
        }

        #visualizer-wrapper {
          position: relative;
          height: calc(100vh - 1px);
          width: 100%;
          background: #000;
          overflow: hidden; /* keep canvases contained */
        }

        #visualizer-3d {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 0; /* background layer */
        }

        #visualizer-2d {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 1; /* overlay layer */
          pointer-events: none; /* let clicks pass through to UI */
        }

        .controls {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
          gap: 1rem;
          padding: 1rem 0;
          position: relative;
          z-index: 10; /* always above canvases */
        }

        html {
          overflow: scroll;
          overflow-x: hidden;
        }

        ::-webkit-scrollbar {
          width: 0;
          background: transparent;
        }

        ::-webkit-scrollbar-thumb {
          background: #FF0000;
        }

        /* Base container */
        .control-item {
          padding: 0.5rem;
          background: #333;
          color: white;
          border: 1px solid #555;
          border-radius: 4px;
          display: flex;
          flex-direction: column;
          gap: 0.25rem;
        }

        /* Labels */
        .control-item label {
          font-size: 0.9rem;
          margin-bottom: 0.25rem;
          color: #ddd;
        }

        /* Text, color, file, range, select inputs */
        .control-item input[type="text"],
        .control-item input[type="color"],
        .control-item input[type="file"],
        .control-item input[type="range"],
        .control-item select {
          width: 100%;
          padding: 0.4rem;
          border: 1px solid #555;
          border-radius: 4px;
          background: #222;
          color: white;
          box-sizing: border-box;
        }

        /* File input: custom look */
        .control-item input[type="file"] {
          padding: 0.3rem;
          background: #222;
          color: #ccc;
        }
        .control-item input[type="file"]::-webkit-file-upload-button {
          background: #444;
          color: white;
          border: none;
          padding: 0.4rem 0.8rem;
          border-radius: 4px;
          cursor: pointer;
        }
        .control-item input[type="file"]::-webkit-file-upload-button:hover {
          background: #555;
        }

        /* Range slider */
        .control-item input[type="range"] {
          -webkit-appearance: none;
          height: 6px;
          border-radius: 3px;
          background: linear-gradient(
            to right,
            var(--accent) 0%,
            var(--accent) var(--percent, 0%),
            #444 var(--percent, 0%),
            #444 100%
          );
        }

        .control-item input[type="range"]::-webkit-slider-thumb {
          -webkit-appearance: none;
          width: 14px;
          height: 14px;
          border-radius: 50%;
          background: var(--accent);
          cursor: pointer;
          position: relative;
        }

        .control-item input[type="range"]::-moz-range-thumb {
          width: 14px;
          height: 14px;
          border-radius: 50%;
          background: var(--accent);
          cursor: pointer;
        }

        .range-pair {
          position: relative;
          width: 100%;
          height: 30px;
        }

        .range-pair input[type="range"] {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          pointer-events: none; /* let both overlap */
          background: none;
        }

        .range-pair input[type="range"]::-webkit-slider-thumb {
          pointer-events: all; /* re-enable thumb dragging */
          width: 14px;
          height: 14px;
          border-radius: 50%;
          background: var(--accent);
          cursor: pointer;
        }

        .range-track {
          position: absolute;
          top: 50%;
          left: 0;
          width: 100%;
          height: 6px;
          transform: translateY(-50%);
          border-radius: 3px;
          background: #444;
        }

        /* Checkbox */
        .control-item input[type="checkbox"] {
          width: 18px;
          height: 18px;
          color:var(--accent);
          accent-color: var(--accent); /* modern browsers */
        }

        /* Buttons */
        .control-item button {
          padding: 0.5rem 1rem;
          background: #444;
          color: white;
          border: 1px solid #555;
          border-radius: 4px;
          cursor: pointer;
        }
        .control-item button:hover {
          background: #555;
        }

    </style>
</head>
<body onclick="var interacted=true">
    <div class="container">
        <div id="visualizer-wrapper" style="position:relative;">
          <!-- 3D background -->
          <canvas id="visualizer-3d" style="position:absolute; top:0; left:0; z-index:0;"></canvas>
          <!-- 2D overlay -->
          <canvas id="visualizer-2d" style="position:absolute; top:0; left:0; z-index:1;"></canvas>
        </div>
        <h1>Global Controls</h1>
        <div class="controls" id="global-controls-container">
        </div>
        <h1>Visualizer Controls</h1>
        <div class="controls" id="controls-container"></div>
    </div>
    <script src="../shared/js/ua.min.js"></script>
    <script src="../shared/js/forgotWhatThisIs.js"></script>
    <script src="presets.js"></script>
    <script>
        const visualizers = {
            bars: {
                displayName: "Bars",
                settings: [
                    { id: 'barCount', type: 'range', label: 'Bar Count', min: 16, max: 256, step: 1, default: 128  },
                    { id: 'color', type: 'color', label: 'Color', default: '#00ff9d' }
                ],
                draw: () => {
                  return () => {
                    const thisConfig = CONFIG.settings.bars;
                    const barWidth = canvas2D.width / thisConfig.barCount;
                    ctx.fillStyle = thisConfig.color;
                    for (let i = 0; i < thisConfig.barCount; i++) {
                        const value = audioData[i];
                        const barHeight = (value / 255) * canvas2D.height * CONFIG.master.sensitivity;
                        const x = i * barWidth;
                        const y = canvas2D.height - barHeight;
                        
                        ctx.fillRect(x, y, barWidth - 2, barHeight);
                    }
                  }
                }
            },
            ...presets
        };
        const masterSettings = [
          {
            id: 'audioUpload',
            type: 'file',
            label: 'Audio File',
            accept: 'audio/*',
            func: async (e) => {
              const file = e.target.files[0];
              if (!file) return;
              await handleFileUpload(file);
            }
          },
                  {
            id: 'playToggle',
            type: 'button',
            label: '▶ Play',
            func: async () => {
              await handlePlayToggle();
            }
          },
          {
            id: 'visualizerSelect',
            type: 'select',
            label: 'Visualizer',
            options: Object.entries(visualizers).map(([key, vis]) => ({
              value: key,
              label: vis.displayName
            })),
            default: 'bars',
            func: (e) => {
              CONFIG.master.visualizerSelect = e.target.value;
              saveConfig();
              renderControls();
            }
          },
          {
            id: 'audioMode',
            type: 'select',
            label: 'Audio Mode',
            options: ['local', 'ws', 'file'],
            default: 'file',
            func: async (e) => {
              await handleAudioModeChange(e.target.value);
            }
          },
          {
            id: 'sensitivity',
            type: 'range',
            label: 'Sensitivity',
            min: 0.1, max: 5, step: 0.1,
            default: 1,
            func: (e) => {
              CONFIG.master.sensitivity = parseFloat(e.target.value);
              saveConfig();
            }
          },
          {
            id: 'fftSize',
            type: 'select',
            label: 'FFT Size',
            options: [512, 1024, 2048, 4096],
            default: 2048,
            func: (e) => {
              CONFIG.master.fftSize = parseInt(e.target.value, 10);
              if (analyser) analyser.fftSize = CONFIG.master.fftSize;
              saveConfig();
            }
          },
          {
            id: 'smoothingTimeConstant',
            type: 'range',
            label: 'Smoothing Constant',
            min: 0, max: 1, step: 0.05,
            default: 0.8,
            func: (e) => {
              CONFIG.master.smoothingTimeConstant = parseFloat(e.target.value);
              saveConfig();
            }
          },
          {
            id: 'smoothingPasses',
            type: 'range',
            label: 'Smoothing Passes',
            min: 1, max: 5, step: 1,
            default: 2,
            func: (e) => {
              CONFIG.master.smoothingPasses = parseInt(e.target.value, 10);
              // re-init smoothing arrays if needed
              window.analyserSmoothingPrevious = Array(CONFIG.master.smoothingPasses)
                .fill()
                .map(() => new Float32Array(audioData.length));
              saveConfig();
            }
          },
          {
            id: 'dBrange',
            type: 'rangePair',
            label: 'dB Range',
            min: -100,
            max: 30,
            step: 1,
            default: [-100, -30],
            func:(e) =>{}
          },
          { id: 'showIdleScreen', type: 'checkbox', label: 'Show Idle Screen', default: true, func:(e) =>{CONFIG.master.showIdleScreen = e.target.checked; saveConfig();}},
          { id: 'showNowPlaying', type: 'checkbox', label: 'Show Now Playing Overlay', default: true, func:(e) =>{CONFIG.master.showNowPlaying = e.target.checked; saveConfig();}}
        ];


        // Configuration
        function initializeConfig() {
          const DEFAULT_CONFIG = {
            activeVisualizer: '',
            master: {},
            settings: {},
          };
          
          masterSettings.forEach(setting => {
            DEFAULT_CONFIG.master[setting.id] = setting.default;
          });
          
          
          // Helper: deep merge defaults into target
          function mergeDefaults(target, defaults) {
              Object.keys(defaults).forEach(key => {
                  if (typeof defaults[key] === 'object' && defaults[key] !== null && !Array.isArray(defaults[key])) {
                      // Ensure nested object exists
                      if (typeof target[key] !== 'object' || target[key] === null || Array.isArray(target[key])) {
                          target[key] = {};
                      }
                      mergeDefaults(target[key], defaults[key]);
                  } else {
                      if (!(key in target)) {
                          target[key] = defaults[key];
                      }
                  }
              });
          }

          // Load saved config
          const savedConfig = JSON.parse(localStorage.getItem('audioVisConfig')) || {};
          const config = JSON.parse(JSON.stringify(savedConfig)); // clone

          // Merge defaults into saved config
          mergeDefaults(config, DEFAULT_CONFIG);

          // Initialize per-visualizer settings
          Object.keys(visualizers).forEach(visKey => {
              config.settings[visKey] = config.settings[visKey] || {};
              visualizers[visKey].settings.forEach(setting => {
                  if (!config.settings[visKey].hasOwnProperty(setting.id)) {
                      config.settings[visKey][setting.id] = setting.default;
                  }
              });
          });

          // Save updated config if new settings were added
          if (JSON.stringify(savedConfig) !== JSON.stringify(config)) {
              localStorage.setItem('audioVisConfig', JSON.stringify(config));
          }

          return config;
      }

        // MAIN CODE
        const canvas2D = document.getElementById('visualizer-2d');
        const ctx = canvas2D.getContext('2d');
        const canvas3D = document.getElementById('visualizer-3d');
        let renderer3D, scene3D, camera3D;
        const CONFIG = initializeConfig();
        
        const visStores = {};
        let audioElement = null;
        let audioContext, analyser, analyserSmoothingPrevious, source, isPlaying = false;
        let audioData = new Uint8Array();
        let ws, wsData = new Uint8Array();
        let micStream = null;
        const mapRange = (value, inMin, inMax, outMin, outMax) => {return ((value - inMin) * (outMax - outMin)) / (inMax - inMin) + outMin;};
        // Web Audio Setup
        async function initAudio() {
          if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') await audioContext.resume();
          }

          if (!analyser) {
            analyser = audioContext.createAnalyser();
            analyser.fftSize = CONFIG.master.fftSize;
            audioData = new Uint8Array(analyser.frequencyBinCount);

            analyser.smoothingTimeConstant = 0; //this is critical firefox lore (why cant they just make it work properly?)
            analyserSmoothingPrevious = new Uint8Array(analyser.frequencyBinCount);
          }
        }
        
        async function initWebSocketStream() {
          if (ws) ws.close();
          ws = new WebSocket("ws://localhost:43374");
          ws.binaryType = "arraybuffer";
          ws.onmessage = (event) => {
            try {
              const data = JSON.parse(event.data);
              const fft = data.fft || [];
              const scaled = fft.map(v => Math.min(255, Math.max(0, v * 2.55)));
              wsData = new Uint8Array(scaled);
              trackMeta.title = data.title || 'Unknown';
              trackMeta.artist = data.artist || 'Unknown';
            } catch (err) {
              console.error("WebSocket parse error:", err);
            }
          };
          ws.onclose = () => console.warn("WebSocket closed");
          ws.onerror = (e) => console.error("WebSocket error:", e);
        }
        
        function stopWebSocket() {
          if (ws) {
            ws.close();
            ws = null;
            wsData = new Uint8Array(); // clear data
          }
        }

        function stopMic() {
          if (micStream) {
            micStream.getTracks().forEach(track => track.stop());
            micStream = null;
          }
        }

        async function startMic() {
          micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const micSource = audioContext.createMediaStreamSource(micStream);
          micSource.connect(analyser);
        }
        
        // UI Functions
        
        // Resize both canvases together
        function resizeCanvases() {
          const w = canvas2D.clientWidth * 1.5;
          const h = canvas2D.clientHeight * 1.5;
          canvas2D.width = w;
          canvas2D.height = h;
          canvas3D.width = w;
          canvas3D.height = h;
          if (renderer3D) renderer3D.setSize(w, h);
        }
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases();
        
        function formatTime(seconds) {
          const m = Math.floor(seconds / 60);
          const s = Math.floor(seconds % 60);
          return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function drawIdleScreen() {
        // Announcer: And the award for jankiest metadata readout ever goes to...
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, canvas2D.width, canvas2D.height);

          ctx.fillStyle = '#fff';
          ctx.font = `${canvas2D.height * 0.05}px monospace`;
          ctx.textAlign = 'center';
          ctx.fillText('No audio playing', canvas2D.width / 2, canvas2D.height * 0.1);

          const artSize = canvas2D.height * 0.4;
          if (trackMeta.picture) {
            const img = trackMeta.picture; // cached Image object
            const artMaxSize = canvas2D.height * 0.4;

            // preserve aspect ratio
            const aspect = img.width / img.height;
            let drawWidth, drawHeight;

            if (aspect > 1) {
              // wider than tall
              drawWidth = artMaxSize;
              drawHeight = artMaxSize / aspect;
            } else {
              // taller than wide
              drawHeight = artMaxSize;
              drawWidth = artMaxSize * aspect;
            }

            const x = (canvas2D.width/2)-drawWidth;
            const y = (canvas2D.height/2)-(drawHeight/2);

            ctx.drawImage(img, x, y, drawWidth, drawHeight);
          } else {
            ctx.fillStyle = '#333';
            ctx.fillRect(canvas2D.width * 0.2, canvas2D.height * 0.3, artSize, artSize);
            ctx.fillStyle = '#fff';
            ctx.fillText('Album Art', canvas2D.width * 0.2 + artSize/4, canvas2D.height * 0.3 + artSize/2);
          }

          ctx.textAlign = 'left';
          ctx.font = `${canvas2D.height * 0.03}px monospace`;
          ctx.fillStyle = '#fff';
          ctx.fillText(`Artist: ${trackMeta.artist}`, canvas2D.width * 0.55, canvas2D.height * 0.45);
          ctx.fillText(`Title: ${trackMeta.title}`, canvas2D.width * 0.55, canvas2D.height * 0.5);
          ctx.fillText(`Album: ${trackMeta.album}`, canvas2D.width * 0.55, canvas2D.height * 0.55);
        }

         
        function drawNowPlayingOverlay() {
          const fontMultiplier = 0.020;
          const linePos=[];
          const elapsed = formatTime(audioElement?.currentTime || 0);
          const total = formatTime(audioElement?.duration || 0);
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(20, 20, 300, 120);
          ctx.fillStyle = '#fff';
          ctx.font = `${canvas2D.height * fontMultiplier}px monospace`;
          ctx.textAlign = 'left';
          for(var i=0;i<4;i++){linePos[i]=50+(canvas2D.height * fontMultiplier*(i+1))}
          ctx.fillText(`Title: ${trackMeta.title}`, 30, linePos[0]);
          ctx.fillText(`Artist: ${trackMeta.artist}`, 30, linePos[1]);
          ctx.fillText(`Album: ${trackMeta.album}`, 30, linePos[2]);
          ctx.fillText(`${elapsed} / ${total}`, 30, linePos[3]);
        }
        
        
        function buildInput(setting, currentValue) {
          let input;

          switch (setting.type) {
            case 'file':
              input = document.createElement('input');
              input.type = 'file';
              input.accept = setting.accept || '';
              break;

            case 'button':
              input = document.createElement('button');
              input.textContent = setting.label;
              break;

            case 'select':
              input = document.createElement('select');
              setting.options.forEach(o => {
                const opt = document.createElement('option');
                opt.value = o.value ?? o;
                opt.textContent = o.label ?? o;
                input.appendChild(opt);
              });
              input.value = currentValue ?? setting.default ?? '';
              break;

            case 'range':
              input = document.createElement('input');
              input.type = 'range';
              input.min = setting.min;
              input.max = setting.max;
              input.step = setting.step ?? 1;
              input.value = currentValue ?? setting.default ?? setting.min;
              break;

            case 'rangePair': {
              const wrapper = document.createElement('div');
              wrapper.classList.add('range-pair');

              const track = document.createElement('div');
              track.classList.add('slider-track');

              const minInput = document.createElement('input');
              minInput.type = 'range';
              minInput.min = setting.min;
              minInput.max = setting.max;
              minInput.step = setting.step || 1;
              minInput.value = currentValue?.[0] ?? setting.default?.[0] ?? setting.min;
              minInput.id = setting.id + '-min';

              const maxInput = document.createElement('input');
              maxInput.type = 'range';
              maxInput.min = setting.min;
              maxInput.max = setting.max;
              maxInput.step = setting.step || 1;
              maxInput.value = currentValue?.[1] ?? setting.default?.[1] ?? setting.max;
              maxInput.id = setting.id + '-max';

              const minGap = setting.minGap || 0;
              const sliderMaxValue = parseInt(maxInput.max, 10);

              function updateHighlight() {
                let minVal = parseInt(minInput.value, 10);
                let maxVal = parseInt(maxInput.value, 10);

                // clamp so they don’t cross
                if (maxVal - minVal <= minGap) {
                  if (event.target === minInput) {
                    minVal = maxVal - minGap;
                    minInput.value = minVal;
                  } else {
                    maxVal = minVal + minGap;
                    maxInput.value = maxVal;
                  }
                }

                const percent1 = (minVal / sliderMaxValue) * 100;
                const percent2 = (maxVal / sliderMaxValue) * 100;

                track.style.background = `linear-gradient(to right,
                  #444 ${percent1}%,
                  var(--accent) ${percent1}%,
                  var(--accent) ${percent2}%,
                  #444 ${percent2}%)`;

                CONFIG.master[setting.id] = [minVal, maxVal];
                saveConfig();
              }

              minInput.addEventListener('input', updateHighlight);
              maxInput.addEventListener('input', updateHighlight);

              wrapper.appendChild(track);
              wrapper.appendChild(minInput);
              wrapper.appendChild(maxInput);

              updateHighlight(); // initialize

              return wrapper;
            }

            case 'checkbox':
              input = document.createElement('input');
              input.type = 'checkbox';
              input.checked = Boolean(currentValue ?? setting.default);
              break;

            case 'text':
              input = document.createElement('input');
              input.type = 'text';
              input.value = currentValue ?? setting.default ?? '';
              break;

            case 'color':
              input = document.createElement('input');
              input.type = 'color';
              input.value = currentValue ?? setting.default ?? '#ffffff';
              break;

            default:
              input = document.createElement('input');
              input.type = setting.type;
              input.value = currentValue ?? setting.default ?? '';
          }

          input.id = setting.id;
          return input;
        }

        
        function attachHandler(input, setting, scope = 'master') {
          const eventType =
            setting.type === 'button' ? 'click' :
            setting.type === 'file'   ? 'change' :
            'input';

          const targetConfig =
            scope === 'master'
              ? CONFIG.master
              : CONFIG.settings[CONFIG.master.visualizerSelect];

          if (setting.func) {
            input.addEventListener(eventType, setting.func);
          } else {
            input.addEventListener(eventType, e => {
              let newValue;
              switch (setting.type) {
                case 'checkbox':
                  newValue = e.target.checked;
                  break;
                case 'range':
                  newValue = parseFloat(e.target.value);
                  break;
                case 'select':
                case 'text':
                case 'color':
                  newValue = e.target.value;
                  break;
                case 'file':
                  newValue = e.target.files[0] || null;
                  break;
                default:
                  newValue = e.target.value;
              }
              targetConfig[setting.id] = newValue;
              saveConfig();
            });
          }
        }


        function renderControls() {
          const globalContainer = document.getElementById('global-controls-container');
          globalContainer.classList.add('controls');
          globalContainer.innerHTML = '';

          masterSettings.forEach(setting => {
            const wrapper = document.createElement('div');
            wrapper.classList.add('control-item');

            const currentValue = CONFIG.master[setting.id];
            const input = buildInput(setting, currentValue);

            attachHandler(input, setting, 'master');

            if (setting.type !== 'button') {
              const label = document.createElement('label');
              label.htmlFor = setting.id;
              label.textContent = setting.label;
              wrapper.appendChild(label);
            }

            wrapper.appendChild(input);
            globalContainer.appendChild(wrapper);
          });

          // Visualizer-specific controls
          const visContainer = document.getElementById('controls-container');
          visContainer.classList.add('controls');
          visContainer.innerHTML = '';

          const currentVis = visualizers[CONFIG.master.visualizerSelect];
          if (currentVis && currentVis.settings) {
            currentVis.settings.forEach(setting => {
              const wrapper = document.createElement('div');
              wrapper.classList.add('control-item');

              const currentValue = CONFIG.settings[CONFIG.master.visualizerSelect][setting.id];
              const input = buildInput(setting, currentValue);

              attachHandler(input, setting, 'visualizer');

              if (setting.type !== 'button') {
                const label = document.createElement('label');
                label.htmlFor = input.id;
                label.textContent = setting.label;
                wrapper.appendChild(label);
              }

              wrapper.appendChild(input);
              visContainer.appendChild(wrapper);
            });
          }
        }


        // Data
        function getVisStore(visKey) {
          if (!visStores[visKey]) visStores[visKey] = {};
          return visStores[visKey];
        }
        
        function saveConfig() {
            localStorage.setItem('audioVisConfig', JSON.stringify(CONFIG));
        }

        // Drawing System
        async function draw() {
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          // clear 2D overlay if needed
          if (isPlaying || CONFIG.master.showIdleScreen) {
            ctx.clearRect(0, 0, canvas2D.width, canvas2D.height);
          }

          if (!isPlaying) {
            if (CONFIG.master.showIdleScreen) {
              drawIdleScreen(); // fills 2D canvas with solid bg + metadata
            }
            requestAnimationFrame(draw);
            return;
          }

          // update audio data
          if (CONFIG.master.audioMode === 'ws' && wsData.length) {
            audioData = wsData;
          } else {
            analyser.getByteFrequencyData(audioData);
          }

          

          try{
            for (let i = 0; i < audioData.length; i++) {
                let currentValue = audioData[i];

                // Apply multiple smoothing passes
                for (let pass = 0; pass < CONFIG.master.smoothingPasses; pass++) {
                    currentValue =
                        window.analyserSmoothingPrevious[pass][i] * CONFIG.master.smoothingTimeConstant +
                        currentValue * (1 - CONFIG.master.smoothingTimeConstant);

                    window.analyserSmoothingPrevious[pass][i] = currentValue;
                }

                audioData[i] = currentValue;
            }
          }catch{
            console.log("Error in smoothing loop, this is probably because CONFIG.master.smoothingPasses was increased while the loop was running or the smoothing array is still initializing. (You can safely ignore this.)")
            try{
              window.analyserSmoothingPrevious = Array(CONFIG.master.smoothingPasses).fill().map(() => new Float32Array(audioData.length));
            }catch(e){
              console.error("Something has gone horribly wrong: ",e);
            }
          }
          // transparent background on 2D overlay
          ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
          ctx.fillRect(0, 0, canvas2D.width, canvas2D.height);

          // get visualizer + persistent store
          const visKey = CONFIG.master.visualizerSelect;
          const vis = visualizers[visKey];
          const store = getVisStore(visKey);

          // load modules once
          if (!store.modules) {
            store.modules = await loadModules(vis);
          }

          // let the visualizer handle its own rendering
          try{vis.draw(store.modules, store)();}catch(e){console.error(e)}

          // overlay metadata
          if (CONFIG.master.showNowPlaying) {
            drawNowPlayingOverlay();
          }

          requestAnimationFrame(draw);
        }

        let trackMeta = {
          title: 'Unknown',
          artist: 'Unknown',
          album: 'Unknown',
          picture: null,       // cached Image object
          pictureUrl: null     // blob/data URL for cleanup
        };
        
        // other random janky stuff
        async function loadModules(vis) {
          const resolved = {};
          if (!vis.modules) return resolved;

          for (const mod of vis.modules) {
            try{
              mod.tries = (mod.tries || 0) + 1;
              if (mod.tries < 3) {
                console.log(`Loading mod "${mod.id}", (Tried ${mod.tries} times)`)
                if (mod.type === 'font') {
                  //mod.tries = mod.tries || mod.tries+1;
                  const font = new FontFace(mod.id, `url(${mod.url})`);
                  await font.load();
                  document.fonts.add(font);
                  resolved[mod.id] = mod.id; // use family name
                } else if (mod.type === 'script') {
                  //mod.tries = mod.tries || mod.tries+1;
                  // dynamic import from full URL
                  const module = await import(/* @vite-ignore */ mod.url);
                  resolved[mod.id] = module;
                } else if (mod.type === 'image') {
                  //mod.tries = mod.tries || mod.tries+1;
                  const img = new Image();
                  img.src = mod.url;
                  await new Promise(res => img.onload = res);
                  resolved[mod.id] = img;
                }
              }
            }catch(e){
              console.warn("Could not load module \"", mod, "\" after", mod.tries, "tries:   ", e)
              
            }
          }
          return resolved;
        }


        // Initialization
        window.addEventListener('resize', resizeCanvases);
        
        function init() {
          renderControls();
          resizeCanvases(); // handles both canvases
          
        }
        
        async function handleFileUpload(file) {
          // Clean up old image URL if any
          if (trackMeta.pictureUrl) {
            URL.revokeObjectURL(trackMeta.pictureUrl);
            trackMeta.pictureUrl = null;
            trackMeta.picture = null;
          }

          // Reset metadata
          trackMeta.title = 'Unknown';
          trackMeta.artist = 'Unknown';
          trackMeta.album = 'Unknown';

          // Parse tags for metadata + cover art
          jsmediatags.read(file, {
            onSuccess: tag => {
              const tags = tag.tags;
              trackMeta.title = tags.title || 'Unknown';
              trackMeta.artist = tags.artist || 'Unknown';
              trackMeta.album = tags.album || 'Unknown';

              if (tags.picture) {
                const { data, format } = tags.picture;
                let binary = '';
                const bytes = new Uint8Array(data);
                const len = bytes.byteLength;
                for (let i = 0; i < len; i++) {
                  binary += String.fromCharCode(bytes[i]);
                }
                const base64 = btoa(binary);
                trackMeta.pictureUrl = `data:${format};base64,${base64}`;

                // Cache Image object
                const img = new Image();
                img.src = trackMeta.pictureUrl;
                img.onload = () => {
                  trackMeta.picture = img;
                };
              }
            },
            onError: err => console.error(err)
          });

          // Audio playback setup
          await initAudio();
          if (source) source.disconnect();

          const url = URL.createObjectURL(file);
          audioElement = new Audio(url);
          source = audioContext.createMediaElementSource(audioElement);
          source.connect(analyser);
          analyser.connect(audioContext.destination);

          try {
            await handlePlayToggle(true)
          } catch (err) {
            console.error('Playback failed:', err);
          }
        }
        
        async function handleAudioModeChange(mode) {
          CONFIG.master.audioMode = mode;
          
          saveConfig();
          renderControls();
          audioUpload.disabled = (mode !== 'file');
          playToggle.disabled = (mode !== 'file');
          
          // stop any active streams
          stopMic();
          stopWebSocket();
          if (audioElement) audioElement.pause();

          if (mode === 'local') {
            // mic input only
            startMic();
            // ⚠️ don't connect to destination if you don't want mic playback
            isPlaying = true;
            draw();
          } else if (mode === 'ws') {
            await initWebSocketStream();
            isPlaying = true;
            draw();
          } else if (mode === 'file') {
            // file playback
            await initAudio(); // sets up audioElement with src and connects to analyser+destination
            try {
              await handlePlayToggle(true);
            } catch (err) {
              console.error('Playback failed:', err);
            }
          }
        }


        async function handlePlayToggle(shouldPlay) {
          const playToggle = document.getElementById('playToggle');
          if (!audioElement) return;
          if (audioContext.state !== 'running') await audioContext.resume();

          if (shouldPlay !== undefined) {
            isPlaying = shouldPlay;
          } else {
            isPlaying = !isPlaying;
          }

          if (isPlaying) {
            await audioElement.play();
            playToggle.textContent = '⏸ Pause';
            draw();
          } else {
            audioElement.pause();
            playToggle.textContent = '▶ Play';
          }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
          init(); // safe to run now
        });

    </script>
</body>
</html>
