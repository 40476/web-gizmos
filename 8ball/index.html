<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic 8 Ball</title>

    <!-- https://www.svgrepo.com/svg/407233/pool-8-ball?edit=true -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- navbar injector -->

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.puter.com/v2/"></script>
    <!-- Adding Three.js for WebGL effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        html{overflow:hidden}
        body {
            background-color: #0f172a; 
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0f172a 70%);
            color: #e2e8f0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
        }

        /* 3D effect for the 8-ball */
        .ball {
            background: radial-gradient(circle at 30% 30%, #4b5563, #000000 60%);
            box-shadow: inset -30px -30px 50px rgba(255, 255, 255, 0.05), 
                        0 30px 50px rgba(0, 0, 0, 0.7);
        }

        /* The window into the liquid */
        .inner-circle {
            background: #000;
            box-shadow: inset 0px 0px 20px rgba(0, 0, 0, 0.9),
                        inset 0px 0px 5px rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            border: 4px solid #111;
        }

        /* Glossy reflection over the window */
        .inner-circle::after {
            content: '';
            position: absolute;
            top: 5%;
            left: 10%;
            width: 80%;
            height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
        }

        /* Shaking animation */
        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            10% { transform: translate(-2px, -3px) rotate(-2deg); }
            20% { transform: translate(-4px, 0px) rotate(2deg); }
            30% { transform: translate(4px, 3px) rotate(0deg); }
            40% { transform: translate(2px, -2px) rotate(2deg); }
            50% { transform: translate(-2px, 3px) rotate(-2deg); }
            60% { transform: translate(-4px, 2px) rotate(0deg); }
            70% { transform: translate(4px, 2px) rotate(-2deg); }
            80% { transform: translate(-2px, -2px) rotate(2deg); }
            90% { transform: translate(2px, 3px) rotate(0deg); }
            100% { transform: translate(2px, -3px) rotate(-2deg); }
        }

        .is-shaking {
            animation: shake 0.4s infinite;
        }

        /* Mystical text styling inside the ball */
        .answer-text {
            text-shadow: 0 0 8px rgba(139, 92, 246, 0.8), 0 0 15px rgba(139, 92, 246, 0.5);
            font-family: 'Georgia', serif;
            letter-spacing: 0.5px;
        }

        /* Smooth transitions for text swapping */
        .fade-enter { opacity: 0; transform: scale(0.8); }
        .fade-enter-active { opacity: 1; transform: scale(1); transition: all 0.8s ease-out; }
        .fade-exit { opacity: 1; transform: scale(1); }
        .fade-exit-active { opacity: 0; transform: scale(0.8); transition: all 0.3s ease-in; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-2 sm:p-4">

    <div class="max-w-md w-full flex flex-col items-center space-y-4">
        
        <!-- Header -->
        <div class="text-center space-y-1">
            <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-500">
                Magic 8 Ball
            </h1>
            <p class="text-slate-400 text-xs sm:text-sm">Ask a question. Choose your fate.</p>
        </div>

        <!-- The 8-Ball -->
        <div id="magicBall" class="ball w-56 h-56 sm:w-64 sm:h-64 rounded-full flex items-center justify-center cursor-pointer transition-transform hover:scale-105" onclick="askQuestion()">
            
            <!-- The Window -->
            <div id="innerCircle" class="inner-circle w-32 h-32 sm:w-36 sm:h-36 rounded-full flex items-center justify-center">
                
                <!-- WebGL Background Layer -->
                <canvas id="webglCanvas" class="absolute inset-0 z-0 w-full h-full"></canvas>
                
                <!-- Blue Triangle Overlay (classic 8-ball style) -->
                <div id="triangle" class="absolute inset-0 z-10 flex items-center justify-center opacity-0 transition-opacity duration-1000">
                    <svg viewBox="0 0 100 100" class="w-[85%] h-[85%] drop-shadow-[0_0_15px_rgba(59,130,246,0.6)]">
                        <polygon points="50,15 95,85 5,85" fill="rgba(30, 58, 138, 0.7)" stroke="#3b82f6" stroke-width="1" />
                    </svg>
                </div>

                <!-- Text Content Layer -->
                <div class="absolute inset-0 z-20 flex items-center justify-center p-4 text-center">
                    <!-- Default 8 -->
                    <span id="eightText" class="text-6xl font-bold text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.5)] select-none font-serif transition-opacity duration-300">
                        8
                    </span>
                    
                    <!-- Answer Text -->
                    <p id="responseText" class="answer-text hidden text-purple-100 font-semibold text-[10px] sm:text-xs leading-snug break-words">
                        <!-- Answer goes here -->
                    </p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="w-full space-y-3">
            <div class="flex space-x-2">
                <select id="styleSelector" class="w-1/3 bg-slate-800/50 border border-slate-700 rounded-xl px-2 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
                    <option value="friendly">Friendly</option>
                    <option value="mean">Mean</option>
                    <option value="silly" selected>Silly</option>
                    <option value="dramatic">Dramatic</option>
                    <option value="roast">Roast Me</option>
                </select>
                <div class="relative w-2/3">
                    <input 
                        type="text" 
                        id="questionInput" 
                        placeholder="Ask your question..." 
                        class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all shadow-inner text-sm"
                        onkeydown="if(event.key === 'Enter') askQuestion()"
                    >
                </div>
            </div>
            <button 
                id="askButton"
                onclick="askQuestion()"
                class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold py-2 px-6 rounded-xl shadow-lg transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed text-sm"
            >
                Consult the Void
            </button>
        </div>

    </div>

    <script>
        // --- WebGL Setup (Three.js) ---
        let scene, camera, renderer, particles;
        let baseRotationSpeed = 0.001;
        let targetRotationSpeed = 0.001;

        function init3D() {
            const canvas = document.getElementById('webglCanvas');
            const container = document.getElementById('innerCircle');
            
            scene = new THREE.Scene();
            // Deep purple/blue fog to simulate the dark liquid
            scene.fog = new THREE.FogExp2(0x0f0c29, 0.15);

            camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            
            // Match canvas size to container
            const size = container.offsetWidth;
            renderer.setSize(size, size);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Create mystical particles
            const particleCount = 800;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            
            const color1 = new THREE.Color(0x8b5cf6); // Purple
            const color2 = new THREE.Color(0x3b82f6); // Blue

            for (let i = 0; i < particleCount * 3; i += 3) {
                // Sphere distribution
                const r = 4 * Math.cbrt(Math.random());
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i] = r * Math.sin(phi) * Math.cos(theta);
                positions[i+1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i+2] = r * Math.cos(phi);

                // Mix colors
                const mixedColor = color1.clone().lerp(color2, Math.random());
                colors[i] = mixedColor.r;
                colors[i+1] = mixedColor.g;
                colors[i+2] = mixedColor.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.1,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Handle Resize
            new ResizeObserver(() => {
                const newSize = container.offsetWidth;
                renderer.setSize(newSize, newSize);
                camera.aspect = 1;
                camera.updateProjectionMatrix();
            }).observe(container);

            animate3D();
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            
            // Smoothly interpolate rotation speed
            baseRotationSpeed += (targetRotationSpeed - baseRotationSpeed) * 0.05;
            
            particles.rotation.y += baseRotationSpeed;
            particles.rotation.x += baseRotationSpeed * 0.5;
            particles.rotation.z += baseRotationSpeed * 0.2;

            renderer.render(scene, camera);
        }

        // Initialize 3D on load
        window.onload = init3D;

        // --- App Logic ---
        const magicBall = document.getElementById('magicBall');
        const questionInput = document.getElementById('questionInput');
        const askButton = document.getElementById('askButton');
        const eightText = document.getElementById('eightText');
        const responseText = document.getElementById('responseText');
        const triangle = document.getElementById('triangle');
        const styleSelector = document.getElementById('styleSelector');

        async function askQuestion() {
            const question = questionInput.value.trim();
            
            if (!question) {
                displayInsideBall("Ask a real question.");
                return;
            }

            if (typeof puter === 'undefined') {
                displayInsideBall("Connection to cosmos lost.");
                return;
            }

            // Start animation and lock UI
            setLoadingState(true);

            const style = styleSelector.value;
            let styleInstruction = "";
            switch(style) {
                case "friendly": styleInstruction = "Be extremely nice, supportive, and uplifting."; break;
                case "mean": styleInstruction = "Be passive-aggressive, cold, and dismissive."; break;
                case "silly": styleInstruction = "Be completely absurd, goofy, and nonsensical."; break;
                case "dramatic": styleInstruction = "Be wildly over-dramatic, treating the question like a matter of life and death."; break;
                case "roast": styleInstruction = "Brutally roast the user for asking such a silly question."; break;
            }

            // Updated prompt: Enforces short text and chosen personality
            const systemPrompt = `You are a Magic 8 Ball. 
The user asks: "${question}"
Rule 1: Give a classic definitive Magic 8 Ball answer (e.g., 'Yes', 'No', 'Reply hazy').
Rule 2: ${styleInstruction} Keep it PG-rated, safe, and clean. NO swearing.
Rule 3: Keep the ENTIRE response under 12 words so it fits perfectly inside a tiny window. Be brief and punchy.`;

            try {
                let aiResponse = await puter.ai.chat(systemPrompt);
                const replyText = typeof aiResponse === 'string' ? aiResponse : 
                                 (aiResponse?.message?.content || aiResponse?.text || "The void is ignoring you.");
                
                displayInsideBall(replyText);
            } catch (error) {
                console.error("AI Error:", error);
                displayInsideBall("My magic broke. Try again later.");
            } finally {
                setLoadingState(false);
                questionInput.value = ''; 
            }
        }

        function setLoadingState(isLoading) {
            if (isLoading) {
                magicBall.classList.add('is-shaking');
                askButton.disabled = true;
                questionInput.disabled = true;
                askButton.textContent = "Peering into the void...";
                
                // Speed up WebGL particles
                targetRotationSpeed = 0.05;
                particles.material.opacity = 0.9;
                
                // Hide current text
                hideAllText();
                triangle.classList.remove('opacity-100');
                triangle.classList.add('opacity-0');
            } else {
                magicBall.classList.remove('is-shaking');
                askButton.disabled = false;
                questionInput.disabled = false;
                askButton.textContent = "Consult the Void";
                
                // Slow down WebGL particles
                targetRotationSpeed = 0.002;
                particles.material.opacity = 0.4;
            }
        }

        function hideAllText() {
            eightText.classList.add('opacity-0');
            responseText.classList.remove('fade-enter-active');
            responseText.classList.add('fade-exit-active');
            
            setTimeout(() => {
                eightText.classList.add('hidden');
                responseText.classList.add('hidden');
            }, 300);
        }

        function displayInsideBall(text) {
            // Wait for shaking and fading to finish
            setTimeout(() => {
                responseText.textContent = text;
                
                // Reset states
                responseText.classList.remove('hidden', 'fade-exit-active');
                eightText.classList.add('hidden');
                
                // Show triangle and text with animation
                triangle.classList.remove('opacity-0');
                triangle.classList.add('opacity-100');
                
                responseText.classList.add('fade-enter');
                
                // Trigger reflow
                void responseText.offsetWidth; 
                
                responseText.classList.remove('fade-enter');
                responseText.classList.add('fade-enter-active');
            }, 400); 
        }
    </script>
</body>
</html>
