        </div>

                    <option value="dramatic">Dramatic</option>
                    <option value="roast" selected>Roast Me</option>
                </select>
                <div class="relative w-2/3">

            <button

            >
                Consult the Void

        </div>

    </div>

            const container = document.getElementById('innerCircle');

            scene.fog = new THREE.FogExp2(0x0f0c29, 0.15);

                positions[i+1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i+2] = r * Math.cos(phi);

            requestAnimationFrame(animate3D);
            baseRotationSpeed += (targetRotationSpeed - baseRotationSpeed) * 0.05;
            particles.rotation.y += baseRotationSpeed;
            particles.rotation.x += baseRotationSpeed * 0.5;

        const questionInput = document.getElementById('questionInput');
        const askButton = document.getElementById('askButton');
        const eightText = document.getElementById('eightText');
        const responseText = document.getElementById('responseText');
        const triangle = document.getElementById('triangle');
        const styleSelector = document.getElementById('styleSelector');

        async function askQuestion() {
            const question = questionInput.value.trim();
            let apiKey = OPENROUTER_API_KEY;

            if (!question) {
                displayInsideBall("Ask a real question.");
                return;
            }

            if (!apiKey) {
                apiKey = prompt("Please enter your OpenRouter API Key:");
                if (!apiKey) return;
            }

            setLoadingState(true);

            const style = styleSelector.value;
            let styleInstruction = "";
            switch(style) {
                case "friendly": styleInstruction = "Be extremely nice, supportive, and uplifting. Pick whatever answer is the happiest."; break;
                case "mean": styleInstruction = "Be passive-aggressive, cold, and dismissive. Pick whatever answer is the darkest."; break;
                case "silly": styleInstruction = "Be completely absurd, goofy, and nonsensical. Pick whatever answer is the funniest."; break;
                case "dramatic": styleInstruction = "Be wildly over-dramatic, treating the question like a matter of life and death. Pick whatever answer makes you seem the most desperate."; break;

            const prompt = `You are a Magic 8 Ball.

Rule 2: ${styleInstruction}
Rule 3: Keep the ENTIRE response under 12 words so it fits perfectly inside a tiny window. Be brief and punchy.
Rule 4: Do not say yes/no if the rest of your reply implies otherwise.`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, // Required by OpenRouter
                        "X-Title": "Magic 8 Ball"
                    },
                    body: JSON.stringify({
                        "model": MODEL,
                        "messages": [
                            {"role": "user", "content": prompt}
                        ],
                        "max_tokens": 30
                    })
                });

                const data = await response.json();
                const replyText = data.choices?.[0]?.message?.content || "The void is silent.";
                displayInsideBall(replyText);
            } catch (error) {
                console.error("OpenRouter Error:", error);
                displayInsideBall("The connection to the void failed.");
            } finally {
                setLoadingState(false);
                questionInput.value = ''; 
            }
        }

        function setLoadingState(isLoading) {
            if (isLoading) {
                magicBall.classList.add('is-shaking');
                askButton.disabled = true;
                questionInput.disabled = true;
                askButton.textContent = "Peering into the void...";
                targetRotationSpeed = 0.05;
                particles.material.opacity = 0.9;
                hideAllText();
                triangle.classList.remove('opacity-100');
                triangle.classList.add('opacity-0');
            } else {
                magicBall.classList.remove('is-shaking');
                askButton.disabled = false;
                questionInput.disabled = false;
                askButton.textContent = "Consult the Void";
                targetRotationSpeed = 0.002;
                particles.material.opacity = 0.4;
            }
        }

        function hideAllText() {
            eightText.classList.add('opacity-0');
            responseText.classList.remove('fade-enter-active');
            responseText.classList.add('fade-exit-active');
            setTimeout(() => {
                eightText.classList.add('hidden');
                responseText.classList.add('hidden');
            }, 300);
        }

        function displayInsideBall(text) {
            setTimeout(() => {
                responseText.textContent = text;
                responseText.classList.remove('hidden', 'fade-exit-active');
                eightText.classList.add('hidden');
                triangle.classList.remove('opacity-0');
                triangle.classList.add('opacity-100');
