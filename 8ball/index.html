        let currentKeyIndex = 0;

        function getCurrentApiKey() {
            return apiKeys[currentKeyIndex];
        }

        function switchToNextApiKey() {
            currentKeyIndex = (currentKeyIndex + 1) % apiKeys.length;
            console.warn(`Switched to API key: ${getCurrentApiKey()}`);
        }

        async function askQuestion() {
            const question = questionInput.value.trim();
            let apiKey = getCurrentApiKey();

            if (!question) {
                displayInsideBall("Ask a real question.");
                return;
            }

            setLoadingState(true);

            const style = styleSelector.value;
            let styleInstruction = "";
            switch(style) {
                case "friendly": styleInstruction = "Be extremely nice, supportive, and uplifting. Pick whatever answer is the happiest."; break;
                case "mean": styleInstruction = "Be passive-aggressive, cold, and dismissive. Pick whatever answer is the darkest."; break;
                case "silly": styleInstruction = "Be completely absurd, goofy, and nonsensical. Pick whatever answer is the funniest."; break;
                case "dramatic": styleInstruction = "Be wildly over-dramatic, treating the question like a matter of life and death. Pick whatever answer makes you seem the most desperate."; break;
                case "roast": styleInstruction = "Brutally roast the user for asking such a silly question. Pick whatever answer is the funniest."; break;
            }

            const prompt = `You are a Magic 8 Ball. 
The user asks: "${question}"
Rule 1: Give a classic definitive Magic 8 Ball answer. but with a twist based on the chosen style.
Rule 2: ${styleInstruction}
Rule 3: Keep the ENTIRE response under 12 words so it fits perfectly inside a tiny window. Be brief and punchy.
Rule 4: Do not say yes/no if the rest of your reply implies otherwise.
Rule 5: If the user asks a math question you may solve it but with a random chance of an incorrect answer`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href,
                        "X-Title": "Magic 8 Ball"
                    },
                    body: JSON.stringify({
                        "model": MODEL,
                        "messages": [
                            {"role": "user", "content": prompt}
                        ],
                        "max_tokens": 30
                    })
                });

                const data = await response.json();
                if (data.error) {
                    switchToNextApiKey();
                    console.log(`API limit reached. Switching keys...`);
                } else {
                    const replyText = data.choices[0].message.content || "The void is silent.";
                    displayInsideBall(replyText);
                }
            } catch (error) {
                console.error("OpenRouter Error:", error);
                displayInsideBall("The connection to the void failed.");
            } finally {
                setLoadingState(false);
                questionInput.value = ''; 
            }
        }
        
        function formatPrettyDate(timestamp) {
          const date = new Date(timestamp);
          const now = new Date();
          
          // Set times to midnight for accurate day comparison
          const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
          const oneDayInMs = 24 * 60 * 60 * 1000;
          
          // Format the time part (e.g., "2:00 am")
          const timeFormatter = new Intl.DateTimeFormat('en-US', {
            hour: 'numeric',
            minute: '2-digit',
            hour12: true
          });
          const timeStr = timeFormatter.format(date).toLowerCase();
        
          const diff = date.getTime() - startOfToday;
        
          let dayStr;
          if (diff >= 0 && diff < oneDayInMs) {
            dayStr = "today";
          } else if (diff >= oneDayInMs && diff < 2 * oneDayInMs) {
            dayStr = "tomorrow";
          } else if (diff < 0 && diff >= -oneDayInMs) {
            dayStr = "yesterday";
          } else {
            // Default to a standard date if outside the relative range
            dayStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          }
        
          return `${timeStr} ${dayStr}`;
        }
        
        function setLoadingState(isLoading) {
            if (isLoading) {
                magicBall.classList.add('is-shaking');
                askButton.disabled = true;
                questionInput.disabled = true;
                askButton.textContent = "Peering into the void...";
                targetRotationSpeed = 0.05;
                particles.material.opacity = 0.9;
                hideAllText();
                triangle.classList.remove('opacity-100');
                triangle.classList.add('opacity-0');
            } else {
                magicBall.classList.remove('is-shaking');
                askButton.disabled = false;
                questionInput.disabled = false;
                askButton.textContent = "Consult the Void";
                targetRotationSpeed = 0.002;
                particles.material.opacity = 0.4;
            }
        }

        function hideAllText() {
            eightText.classList.add('opacity-0');
            responseText.classList.remove('fade-enter-active');
            responseText.classList.add('fade-exit-active');
            setTimeout(() => {
                eightText.classList.add('hidden');
                responseText.classList.add('hidden');
            }, 300);
        }

        function displayInsideBall(markdownText) {
            // 1. Clear any existing revert timer to reset the clock
            clearTimeout(revertTimer);
        
            setTimeout(() => {
                // Convert Markdown and show the answer
                const htmlContent = marked.parse(markdownText);
                responseText.innerHTML = htmlContent;
        
                // Visual transitions
                responseText.classList.remove('hidden', 'fade-exit-active');
                eightText.classList.add('hidden');
                triangle.classList.remove('opacity-0');
                triangle.classList.add('opacity-100');
                
                responseText.classList.add('fade-enter');
                void responseText.offsetWidth; // Trigger reflow
                responseText.classList.remove('fade-enter');
                responseText.classList.add('fade-enter-active');
        
                // 2. Set the 45-second revert timer
                revertTimer = setTimeout(() => {
                    revertToEight();
                }, 45000); 
        
            }, 400);
        }
        
        function revertToEight() {
            // Hide the answer and triangle
            responseText.classList.add('hidden');
            triangle.classList.add('opacity-0');
            triangle.classList.remove('opacity-100');
        
            // Show the big 8
            eightText.classList.remove('hidden');
            eightText.classList.add('opacity-100');
        }
    </script>
